// ─── CLOUD STORAGE MODULE ────────────────────────────────────────────────────
// Firebase Firestore + Auth integration for match persistence and sync.
//
// ── SETUP INSTRUCTIONS ──
// 1. Go to https://console.firebase.google.com
// 2. Create a new project (or use existing)
// 3. Add a Web App (Settings → General → Your apps → Add app → Web)
// 4. Copy the firebaseConfig object and paste below
// 5. Enable Authentication → Sign-in method → Email/Password (enable)
// 6. Enable Authentication → Sign-in method → Anonymous (enable)
// 7. Create Firestore Database (Cloud Firestore → Create database → Start in test mode)
// 8. Set CLOUD_ENABLED = true below
// 9. Deploy Firestore security rules (see FIRESTORE_RULES below)
//
const CLOUD_ENABLED = false; // ← Set to true after Firebase is configured
const FIREBASE_CONFIG = {
  // ← Paste your Firebase config here:
  // apiKey: "AIza...",
  // authDomain: "your-project.firebaseapp.com",
  // projectId: "your-project-id",
  // storageBucket: "your-project.appspot.com",
  // messagingSenderId: "123456789",

};

const CloudStorage = {
  _db: null,
  _auth: null,
  _user: null,
  _initialized: false,
  _listeners: [],
  _syncStatus: "idle", // idle | syncing | synced | error | offline

  // ── Initialize Firebase + Auth + Firestore ──────────────────
  init: async function() {
    if (!CLOUD_ENABLED || this._initialized) return false;
    try {
      // Dynamically load Firebase SDK (compat version for simpler API)
      if (typeof firebase === "undefined") {
        await this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js");
        await Promise.all([
          this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"),
          this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"),
        ]);
      }
      // Initialize app (only once)
      if (!firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      this._auth = firebase.auth();
      this._db = firebase.firestore();

      // Enable offline persistence (cache-first for courtside use)
      try {
        await this._db.enablePersistence({ synchronizeTabs: true });
        console.log("☁️ Offline persistence enabled");
      } catch (e) {
        if (e.code === "failed-precondition") {
          console.warn("☁️ Multiple tabs open — persistence limited to one tab");
        } else if (e.code === "unimplemented") {
          console.warn("☁️ Browser doesn't support persistence");
        }
      }

      // Listen for online/offline status
      this._db.enableNetwork().catch(() => {});
      window.addEventListener("online", () => {
        this._db.enableNetwork();
        this._syncStatus = "syncing";
        this._notifyListeners();
      });
      window.addEventListener("offline", () => {
        this._syncStatus = "offline";
        this._notifyListeners();
      });

      this._initialized = true;
      console.log("☁️ Cloud storage initialized");
      return true;
    } catch (e) {
      console.error("☁️ Init failed:", e);
      return false;
    }
  },

  _loadScript: function(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  },

  // ── Sync status listeners ───────────────────────────────────
  onSyncChange: function(callback) {
    this._listeners.push(callback);
    return () => { this._listeners = this._listeners.filter(l => l !== callback); };
  },
  _notifyListeners: function() {
    this._listeners.forEach(l => l(this._syncStatus));
  },

  // ── AUTH: Sign up with email/password ───────────────────────
  signUp: async function(email, password, displayName) {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.createUserWithEmailAndPassword(email, password);
      if (displayName) {
        await cred.user.updateProfile({ displayName: displayName });
      }
      this._user = cred.user;
      // Create user profile document
      await this._db.collection("users").doc(cred.user.uid).set({
        email: email,
        displayName: displayName || "",
        createdAt: Date.now(),
      }, { merge: true });
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Sign in with email/password ───────────────────────
  signIn: async function(email, password) {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.signInWithEmailAndPassword(email, password);
      this._user = cred.user;
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Anonymous sign-in (no account needed) ─────────────
  signInAnonymous: async function() {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.signInAnonymously();
      this._user = cred.user;
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Sign out ──────────────────────────────────────────
  signOut: async function() {
    if (!this._auth) return;
    try {
      await this._auth.signOut();
      this._user = null;
    } catch (e) { console.error("Sign out failed:", e); }
  },

  // ── AUTH: Get current user ──────────────────────────────────
  getUser: function() { return this._user || (this._auth && this._auth.currentUser); },

  // ── AUTH: Listen for auth state changes ─────────────────────
  onAuthChange: function(callback) {
    if (!this._auth) return () => {};
    return this._auth.onAuthStateChanged(user => {
      this._user = user;
      callback(user);
    });
  },

  // ── Helper: get user-scoped collection path ─────────────────
  _userPath: function() {
    const uid = this.getUser() && this.getUser().uid;
    if (!uid) throw new Error("Not authenticated");
    return "users/" + uid;
  },

  // ── MATCHES: Save a complete match ──────────────────────────
  saveMatch: async function(matchData) {
    if (!this._db || !this.getUser()) return null;
    try {
      this._syncStatus = "syncing";
      this._notifyListeners();
      const docId = matchData.setup.player1.replace(/[^a-zA-Z0-9]/g, "") + "_vs_" +
                    matchData.setup.player2.replace(/[^a-zA-Z0-9]/g, "") + "_" +
                    matchData.setup.date + "_" + Date.now();
      const doc = {
        setup: matchData.setup,
        points: matchData.points,
        score: matchData.score,
        matchTime: matchData.matchTime,
        conditions: matchData.conditions || "",
        themeId: matchData.themeId || "original",
        savedAt: Date.now(),
        pointCount: matchData.points.length,
        matchComplete: !!matchData.matchTime.end,
        userId: this.getUser().uid,
      };
      await this._db.doc(this._userPath() + "/matches/" + docId).set(doc);
      this._syncStatus = "synced";
      this._notifyListeners();
      console.log("☁️ Match saved:", docId);
      return docId;
    } catch (e) {
      this._syncStatus = "error";
      this._notifyListeners();
      console.error("☁️ Save failed:", e);
      return null;
    }
  },

  // ── MATCHES: Auto-save active session ───────────────────────
  autoSave: async function(sessionKey, matchData) {
    if (!this._db || !this.getUser()) return false;
    try {
      await this._db.doc(this._userPath() + "/sessions/" + sessionKey).set({
        ...matchData,
        savedAt: Date.now(),
        userId: this.getUser().uid,
      }, { merge: true });
      return true;
    } catch (e) {
      console.warn("☁️ Auto-save failed:", e);
      return false;
    }
  },

  // ── MATCHES: List all saved matches ─────────────────────────
  listMatches: async function() {
    if (!this._db || !this.getUser()) return [];
    try {
      const snap = await this._db.collection(this._userPath() + "/matches")
        .orderBy("savedAt", "desc")
        .limit(100)
        .get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {
      console.error("☁️ List failed:", e);
      return [];
    }
  },

  // ── MATCHES: Load a specific match ──────────────────────────
  loadMatch: async function(docId) {
    if (!this._db || !this.getUser()) return null;
    try {
      const doc = await this._db.doc(this._userPath() + "/matches/" + docId).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    } catch (e) {
      console.error("☁️ Load failed:", e);
      return null;
    }
  },

  // ── MATCHES: Delete a match ─────────────────────────────────
  deleteMatch: async function(docId) {
    if (!this._db || !this.getUser()) return false;
    try {
      await this._db.doc(this._userPath() + "/matches/" + docId).delete();
      return true;
    } catch (e) {
      console.error("☁️ Delete failed:", e);
      return false;
    }
  },

  // ── MATCHES: Share a match (copy to /shared collection) ─────
  shareMatch: async function(docId) {
    if (!this._db || !this.getUser()) return null;
    try {
      const match = await this.loadMatch(docId);
      if (!match) return null;
      const shareId = "share_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      await this._db.doc("shared/" + shareId).set({
        ...match,
        sharedBy: this.getUser().uid,
        sharedByName: this.getUser().displayName || this.getUser().email || "Anonymous",
        sharedAt: Date.now(),
      });
      return shareId;
    } catch (e) {
      console.error("☁️ Share failed:", e);
      return null;
    }
  },

  // ── MATCHES: Load a shared match (no auth needed for read) ──
  loadSharedMatch: async function(shareId) {
    if (!this._db) return null;
    try {
      const doc = await this._db.doc("shared/" + shareId).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    } catch (e) {
      console.error("☁️ Load shared failed:", e);
      return null;
    }
  },
};

function CloudAuthModal({ onAuth, onClose, onSkip, T = THEMES.original }) {
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError(null);
    setLoading(true);
    let result;
    if (mode === "signup") {
      result = await CloudStorage.signUp(email, password, name);
    } else {
      result = await CloudStorage.signIn(email, password);
    }
    setLoading(false);
    if (result.error) {
      setError(result.error);
    } else {
      onAuth(result.user);
    }
  };

function fmtDuration(ms) {
  if (!ms || ms < 0) return "—";
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const sec = totalSec % 60;
  if (h > 0) return h + "h " + m + "m";
  return m + "m " + String(sec).padStart(2,"0") + "s";
}
function fmtTime(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function pct(n, d) { return d ? Math.round((n / d) * 100) : 0; }

// Derive serve side from current point score
// Regular games: Deuce = even total points, Ad = odd
// Tiebreaks/Super TB: numeric scores, same even/odd rule
function deriveServeSide(scorePoints) {
  const p1v = scorePoints.p1;
  const p2v = scorePoints.p2;
  // Check if scores are numeric (tiebreak mode)
  const p1n = Number(p1v);
  const p2n = Number(p2v);
  if (!isNaN(p1n) && !isNaN(p2n) && (p1n > 3 || p2n > 3 || (p1v !== "0" && p1v !== "15" && p1v !== "30" && p1v !== "40" && p1v !== "AD"))) {
    // Numeric tiebreak scoring — total points determines side
    const total = p1n + p2n;
    return total % 2 === 0 ? "Deuce" : "Ad";
  }
  // Regular game scoring
  const seq = ["0","15","30","40","AD"];
  const p1i = seq.indexOf(p1v);
  const p2i = seq.indexOf(p2v);
  const total = (p1i >= 0 ? p1i : 0) + (p2i >= 0 ? p2i : 0);
  return total % 2 === 0 ? "Deuce" : "Ad";
}

// ─── SCORE LOGIC ──────────────────────────────────────────────────────────────

// ── AUTO PRESSURE POINT DETECTION ──────────────────────────────────────
// Returns true if the current score state is a pressure point:
//   Break point (returner can break), Set point, Match point, Deuce/Ad, 30-40
function detectPressurePoint(score, format) {
  if (!score || score.matchWinner) return false;
  const { sets, games, points, server, superTieBreak, currentSet } = score;
  const returner = server === "p1" ? "p2" : "p1";
  const sp = points[server];   // server's point score
  const rp = points[returner]; // returner's point score

  // ── Super tie-break pressure ──
  if (superTieBreak) {
    const sn = Number(sp) || 0;
    const rn = Number(rp) || 0;
    // Match point for either side (>=9 and leading by 1+)
    if ((sn >= 9 && sn > rn) || (rn >= 9 && rn > sn)) return true;
    return false;
  }

  // ── Point-level pressure ──
  // Deuce (40-40)
  if (sp === "40" && rp === "40") return true;
  // Ad situation (someone has AD)
  if (sp === "AD" || rp === "AD") return true;
  // 30-40 (server at 30, returner at 40 — break point)
  if (sp === "30" && rp === "40") return true;
  // 40-30 is not a break point but 30-40 from server's perspective is

  // ── Break point: returner at 40 or AD while server is not at AD ──
  const isBreakPoint = (rp === "40" && sp !== "40" && sp !== "AD") || (rp === "AD");

  // ── Check for set point / match point ──
  const gS = games[server];
  const gR = games[returner];
  const target = getSetTarget(format);
  const needed = setsNeeded(format);

  // Count sets won
  const setsWon = (pid) => sets.filter((st, i) => i < currentSet && st[pid] > st[pid === "p1" ? "p2" : "p1"]).length;

  // Is someone one game away from winning the set?
  // Server holds and could win: server has target-1 games and is at 40/AD
  // Returner breaks and could win: returner has target-1 games and has break point
  const serverCanWinGame = sp === "40" || sp === "AD";
  const returnerCanWinGame = isBreakPoint;

  const checkSetPoint = (pid, canWin) => {
    if (!canWin) return false;
    const gP = games[pid];
    const gO = games[pid === "p1" ? "p2" : "p1"];
    // Standard set point: player has >=target-1 games and leads by 1+ or at target-1 each (tiebreak next or win)
    if (gP >= target - 1 && gP >= gO && (gP - gO >= 1 || (gP === target - 1 && gO === target - 1))) {
      // At target-1 each, it's not a set point unless tiebreak scenario (target+1 vs target possible)
      if (gP === target - 1 && gO === target - 1) return false; // goes to tie territory
      return true;
    }
    // Tiebreak-level: gP=target, gO=target-1 or gP=target, gO=target
    if (gP >= target && gP - gO >= 1) return true;
    return false;
  };

  const serverSetPoint = checkSetPoint(server, serverCanWinGame);
  const returnerSetPoint = checkSetPoint(returner, returnerCanWinGame);

  // Match point: set point AND winning this set wins the match
  const checkMatchPoint = (pid, isSetPt) => {
    if (!isSetPt) return false;
    return setsWon(pid) >= needed - 1;
  };

  if (checkMatchPoint(server, serverSetPoint) || checkMatchPoint(returner, returnerSetPoint)) return true;
  if (serverSetPoint || returnerSetPoint) return true;
  if (isBreakPoint) return true;

  return false;
}

function getSetTarget(format) {
  return (format === "Short Set (1st to 4)" || format === "Best of 3 Short Sets") ? 4 : 6;
}
function setsNeeded(format) {
  if (format === "Best of 5") return 3;
  if (format === "1 Set" || format === "Short Set (1st to 4)") return 1;
  return 2;
}

function rebuildScore(pts, fmt, superTieAt11) {
  let sc = {
    sets: [{ p1: 0, p2: 0 }],
    games: { p1: 0, p2: 0 },
    points: { p1: "0", p2: "0" },
    currentSet: 0,
    server: "p1",
    matchWinner: null,
    superTieBreak: false,
    tieBreak: false,       // regular tiebreak at 6-6
    tieBreakPts: 0,        // total points played in tiebreak (for server rotation)
    tieBreakServer: "p1",  // who serves first in tiebreak
  };
  for (const p of pts) {
    const winner = p.pointWinner;
    if (!winner || sc.matchWinner) continue;
    const loser = winner === "p1" ? "p2" : "p1";

    // ── SUPER TIE-BREAK (deciding set, first to 10) ──
    if (sc.superTieBreak) {
      sc.points[winner] = String(Number(sc.points[winner]) + 1);
      const wp = Number(sc.points[winner]);
      const lp = Number(sc.points[loser]);
      // Server rotation: first point by initial server, then alternate every 2
      sc.tieBreakPts++;
      const tbTotal = sc.tieBreakPts;
      if (tbTotal === 1) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      } else if (tbTotal > 1 && (tbTotal - 1) % 2 === 0) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      }
      if (wp >= 10 && wp - lp >= 2) {
        sc.sets[sc.currentSet][winner]++;
        sc.matchWinner = winner;
      }
      continue;
    }

    // ── REGULAR TIEBREAK (6-6, first to 7) ──
    if (sc.tieBreak) {
      sc.points[winner] = String(Number(sc.points[winner]) + 1);
      const wp = Number(sc.points[winner]);
      const lp = Number(sc.points[loser]);
      // Server rotation: first server serves 1 point, then alternate every 2
      sc.tieBreakPts++;
      const tbTotal = sc.tieBreakPts;
      if (tbTotal === 1) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      } else if (tbTotal > 1 && (tbTotal - 1) % 2 === 0) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      }
      if (wp >= 7 && wp - lp >= 2) {
        // Tiebreak won — set goes 7-6
        sc.games[winner]++;
        sc.sets[sc.currentSet][winner] = sc.games[winner];
        sc.sets[sc.currentSet][loser] = sc.games[loser];
        sc.tieBreak = false;
        sc.tieBreakPts = 0;
        sc.games = { p1: 0, p2: 0 };
        sc.points = { p1: "0", p2: "0" };
        // Server after tiebreak: the player who received first in the tiebreak
        sc.server = sc.tieBreakServer === "p1" ? "p2" : "p1";
        const sW = setsNeeded(fmt);
        const setsWonByWinner = sc.sets.filter(st => st[winner] > st[loser]).length;
        if (setsWonByWinner >= sW) { sc.matchWinner = winner; continue; }
        const p1s = sc.sets.filter(st => st.p1 > st.p2).length;
        const p2s = sc.sets.filter(st => st.p2 > st.p1).length;
        sc.currentSet++;
        sc.sets.push({ p1: 0, p2: 0 });
        if (superTieAt11 && p1s === 1 && p2s === 1) {
          sc.superTieBreak = true;
          sc.tieBreakPts = 0;
          sc.points = { p1: "0", p2: "0" };
        }
      }
      continue;
    }

    // ── REGULAR GAME SCORING ──
    const wp = sc.points[winner]; const lp = sc.points[loser];
    let gameWon = false;
    if (wp === "AD") { gameWon = true; }
    else if (wp === "40" && lp !== "40" && lp !== "AD") { gameWon = true; }
    else if (wp === "40" && lp === "40") { sc.points[winner] = "AD"; }
    else if (wp === "40" && lp === "AD") { sc.points[loser] = "40"; }
    else {
      const seq = ["0","15","30","40"];
      const idx = seq.indexOf(wp);
      if (idx < 3) sc.points[winner] = seq[idx + 1];
    }
    if (!gameWon) continue;

    sc.points = { p1: "0", p2: "0" };
    sc.games[winner]++;
    sc.server = sc.server === "p1" ? "p2" : "p1";

    const gW = sc.games[winner], gL = sc.games[loser];
    const target = getSetTarget(fmt);

    // Check if we've reached tiebreak territory (both at target games, e.g. 6-6)
    if (gW === target && gL === target) {
      // Enter tiebreak
      sc.tieBreak = true;
      sc.tieBreakPts = 0;
      sc.tieBreakServer = sc.server; // who serves first in tiebreak
      sc.points = { p1: "0", p2: "0" };
      continue;
    }

    let setWon = (gW >= target && gW - gL >= 2);
    if (!setWon) continue;

    sc.sets[sc.currentSet][winner] = gW;
    sc.sets[sc.currentSet][loser] = gL;
    sc.games = { p1: 0, p2: 0 };
    const sW = setsNeeded(fmt);
    const setsWonByWinner = sc.sets.filter(st => st[winner] > st[loser]).length;
    if (setsWonByWinner >= sW) { sc.matchWinner = winner; break; }

    const p1s = sc.sets.filter(st => st.p1 > st.p2).length;
    const p2s = sc.sets.filter(st => st.p2 > st.p1).length;
    sc.currentSet++;
    sc.sets.push({ p1: 0, p2: 0 });
    if (superTieAt11 && p1s === 1 && p2s === 1) {
      sc.superTieBreak = true;
      sc.tieBreakPts = 0;
      sc.points = { p1: "0", p2: "0" };
    }
  }
  return sc;
}

// ─── STATS CALCULATIONS ───────────────────────────────────────────────────────
function calcStats(points) {
  if (!points.length) return null;
  const total = points.length;
  const p1pts = points.filter(p => p.pointWinner === "p1").length;
  const p2pts = total - p1pts;

  const serveStats = (pid) => {
    const served = points.filter(p => p.server === pid);
    const aces = served.filter(p => p.outcome === "Ace").length;
    const dfs = served.filter(p => p.outcome === "Double Fault").length;
    const first = served.filter(p => p.serveType === "1st Serve");
    const second = served.filter(p => p.serveType === "2nd Serve");
    const firstWon = first.filter(p => p.pointWinner === pid).length;
    const secondWon = second.filter(p => p.pointWinner === pid).length;
    const faults = served.filter(p => p.serveFault && p.serveFault !== "?");
    const faultTypes = {};
    faults.forEach(p => { faultTypes[p.serveFault] = (faultTypes[p.serveFault] || 0) + 1; });
    const zoneCount = (side) => {
      const z = {};
      served.filter(p => p.serveSide === side && p.serveZone).forEach(p => {
        z[p.serveZone] = (z[p.serveZone] || 0) + 1;
      });
      return z;
    };
    return {
      total: served.length, aces, dfs,
      firstIn: first.length, firstWon,
      secondIn: second.length, secondWon,
      faultTypes,
      deuceZones: zoneCount("Deuce"),
      adZones: zoneCount("Ad"),
    };
  };

  const rallyDist = {};
  RALLY_RANGES.forEach(r => { rallyDist[r] = points.filter(p => p.rallyLength === r).length; });

  const netP1 = points.filter(p => p.netApproach && p.server === "p1");
  const netP2 = points.filter(p => p.netApproach && p.server === "p2");

  const bpFor = (pid) => points.filter(p => p.pressurePoint && p.server !== pid);
  const bpWon = (pid) => bpFor(pid).filter(p => p.pointWinner === pid);
  const bpFaced = (pid) => points.filter(p => p.pressurePoint && p.server === pid);
  const bpSaved = (pid) => bpFaced(pid).filter(p => p.pointWinner === pid);

  const retZoneCount = (pid) => {
    const z = {};
    points.filter(p => p.server !== pid && p.returnLandZone).forEach(p => {
      z[p.returnLandZone] = (z[p.returnLandZone] || 0) + 1;
    });
    return z;
  };

  // Serve & Volley stats: server went to net (Serve +1 was a volley)
  const serveVolley = (pid) => {
    const sv = points.filter(p => p.server === pid &&
      (p.servePlusOne === "Volley" || p.servePlusOne === "Volley Forehand" || p.servePlusOne === "Volley Backhand"));
    return {
      total: sv.length,
      won: sv.filter(p => p.pointWinner === pid).length,
    };
  };

  return {
    total, p1pts, p2pts,
    p1serve: serveStats("p1"), p2serve: serveStats("p2"),
    rallyDist,
    netP1, netP2,
    p1winners: points.filter(p => p.pointWinner === "p1" && (p.outcome === "Winner" || p.outcome === "Ace")).length,
    p2winners: points.filter(p => p.pointWinner === "p2" && (p.outcome === "Winner" || p.outcome === "Ace")).length,
    p1ue: points.filter(p => p.outcome === "Unforced Error" && p.pointWinner !== "p1").length,
    p2ue: points.filter(p => p.outcome === "Unforced Error" && p.pointWinner !== "p2").length,
    p1fe: points.filter(p => p.outcome === "Forced Error" && p.pointWinner !== "p1").length,
    p2fe: points.filter(p => p.outcome === "Forced Error" && p.pointWinner !== "p2").length,
    p1bp: { opp: bpFor("p1").length, won: bpWon("p1").length, faced: bpFaced("p1").length, saved: bpSaved("p1").length },
    p2bp: { opp: bpFor("p2").length, won: bpWon("p2").length, faced: bpFaced("p2").length, saved: bpSaved("p2").length },
    p1returnZones: retZoneCount("p1"),
    p2returnZones: retZoneCount("p2"),
    p1sv: serveVolley("p1"),
    p2sv: serveVolley("p2"),
  };
}

  // CSV — verified field order (one row per point, all fields)

    "NetApproach", "PressurePoint",
    "PointWinner", "WinnerUTR", "WinnerHand"
  ];
  const matchStartTs = points.length > 0 && points[0].timestamp ? points[0].timestamp : 0;
  const rows = points.map((p, i) => {
    const isP1Server = p.server === "p1";

    const ss = p.scoreSnapshot || {};
    const setNum = ss.setNum || "";
    const gameStr = ss.games ? ss.games.p1 + "-" + ss.games.p2 : "";
    const ptsStr = ss.points ? ss.points.p1 + "-" + ss.points.p2 : "";
    const ts = p.timestamp ? new Date(p.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "";
    const elapsedMin = p.timestamp && matchStartTs ? Math.round((p.timestamp - matchStartTs) / 60000) : "";
    return [
      i + 1,
      ts,
      elapsedMin,
      setNum,
      gameStr,
      ptsStr,
      isP1Server ? setup.player1 : setup.player2,
      isP1Server ? (setup.p1utr || "") : (setup.p2utr || ""),
      isP1Server ? (setup.p1hand || "") : (setup.p2hand || ""),
      p.serveSide || "",
      p.serveType || "",
      p.serveSpin || "",
      p.serveZone || "",
      (p.serveFault && p.serveFault !== "?") ? p.serveFault : "",
      p.dfFaultType || "",
      p.returnHand || "",
      p.returnPosition || "",
      p.returnLandZone || "",
      p.returnLandAbsolute || "",
      p.servePlusOne || "",
      p.sp1Dir || "",
      p.returnPlusOne || "",
      p.rp1Dir || "",
      p.rallyLength || "",
      p.outcome || "",
      p.errorShot || "",
      p.errorDirection || "",
      p.shotType || "",
      p.netApproach ? "Yes" : "No",
      p.pressurePoint ? "Yes" : "No",
      isP1Winner ? setup.player1 : setup.player2,
      isP1Winner ? (setup.p1utr || "") : (setup.p2utr || ""),
      isP1Winner ? (setup.p1hand || "") : (setup.p2hand || ""),
    ].map(v => { const s = String(v); return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",");
  });
  const csv = [hdrs.map(h => '"' + h + '"').join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = setup.player1 + "_vs_" + setup.player2 + "_" + setup.date + ".csv";
  a.click();
}

// ─── PDF EXPORT ───────────────────────────────────────────────────────────────
function exportPDF(points, setup, score, matchTime, conditions) {
  const stats = calcStats(points);
  const { player1, player2 } = setup;
  const duration = matchTime.start && matchTime.end ? fmtDuration(matchTime.end - matchTime.start) : "In progress";
  const pct = (n, d) => d ? Math.round((n / d) * 100) + "%" : "—";

  // Zone heatmap table — no nested template literals
  function zoneTable(zones, side) {
    const ltr = side === "Ad" ? ["T","Body","Wide"] : ["Wide","Body","T"];
    const max = Math.max(1, ...Object.values(zones));
    let headerCells = ltr.map(c => "<th>" + c + "</th>").join("");
    let deepCells = ltr.map(c => {
      const v = zones[c + "-Deep"] || 0;
      const alpha = (0.08 + (v/max) * 0.8).toFixed(2);
      return "<td style='background:rgba(244,211,94," + alpha + ");font-weight:" + (v/max > 0.4 ? 700 : 400) + "'>" + v + "<br><small>Deep</small></td>";
    }).join("");
    let midCells = ltr.map(c => {
      const v = zones[c + "-Mid"] || 0;
      const alpha = (0.08 + (v/max) * 0.8).toFixed(2);
      return "<td style='background:rgba(244,211,94," + alpha + ");font-weight:" + (v/max > 0.4 ? 700 : 400) + "'>" + v + "<br><small>Mid</small></td>";
    }).join("");
    return "<table class='zone-table'><thead><tr><th colspan='3'>" + side + " Side</th></tr><tr>" + headerCells + "</tr></thead><tbody><tr>" + deepCells + "</tr><tr>" + midCells + "</tr></tbody></table>";
  }

  function retZoneTable(zones) {
    const max = Math.max(1, ...Object.values(zones));
    const cols = ["Cross","Center","Wide"];
    const depths = ["Deep","Mid"];
    let rows = depths.map(depth => {
      let cells = cols.map(col => {
        const key = col + "-" + depth;
        const v = zones[key] || 0;
        const alpha = (0.1 + (v/max) * 0.75).toFixed(2);
        return "<td style='background:rgba(64,145,108," + alpha + ");font-weight:" + (v/max > 0.4 ? 700 : 400) + "'>" + v + "<br><small>" + depth + "</small></td>";
      }).join("");
      return "<tr>" + cells + "</tr>";
    }).join("");
    const netRow = (zones["Net"] || 0) > 0
      ? "<tr><td colspan='3' style='background:#ffe0e0;color:#c0392b;font-weight:700;text-align:center;padding:4px'>Net: " + zones["Net"] + "</td></tr>"
      : "";
    return "<table class='zone-table'><thead><tr><th>Cross</th><th>Center</th><th>Wide</th></tr></thead><tbody>" + rows + netRow + "</tbody></table>";
  }

  function statRow(label, v1, v2) {
    return "<tr><td class='sv p1'>" + v1 + "</td><td class='sl'>" + label + "</td><td class='sv p2'>" + v2 + "</td></tr>";
  }

  function bpBox(name, bp, col) {
    return "<div class='bp-box'>" +
      "<div style='font-weight:800;color:" + col + ";margin-bottom:6px'>" + name + "</div>" +
      "<div class='bp-row'><span>BP Chances</span><span><b>" + bp.opp + "</b></span></div>" +
      "<div class='bp-row'><span>BP Won</span><span><b style='color:#27ae60'>" + bp.won + "</b> (" + pct(bp.won, bp.opp) + ")</span></div>" +
      "<div class='bp-row'><span>BP Faced</span><span><b style='color:#c0392b'>" + bp.faced + "</b></span></div>" +
      "<div class='bp-row'><span>BP Saved</span><span><b>" + bp.saved + "</b> (" + pct(bp.saved, bp.faced) + ")</span></div>" +
      "</div>";
  }

  function rallyRow(label, count, total) {
    const p = total ? Math.round((count / total) * 100) : 0;
    return "<div class='rrow'>" +
      "<span style='width:36px;font-weight:700'>" + label + "</span>" +
      "<div class='rbg'><div class='rfill' style='width:" + p + "%'></div></div>" +
      "<span style='width:26px;text-align:right;font-weight:700;color:#2d6a4f'>" + count + "</span>" +
      "<span style='width:32px;color:#999'>" + p + "%</span>" +
      "</div>";
  }

  function pointLogRow(p, i, player1, player2) {
    const srv = p.server === "p1" ? player1 : player2;
    const win = p.pointWinner === "p1" ? player1 : player2;

    const fault = p.serveFault && p.serveFault !== "?" ? p.serveFault : "—";
    const ocLabel = p.errorShot ? ((oc.includes("Un") ? "UE" : "FE") + "-" + p.errorShot) : oc || "—";
    const even = i % 2 === 0 ? "style='background:#f8f9fb'" : "";
    return "<tr " + even + ">" +
      "<td>" + (i+1) + "</td><td>" + srv + "</td>" +

      "<td>" + (p.serveSide ? p.serveSide.slice(0,1) : "—") + "</td>" +
      "<td>" + (p.serveDir || "—") + "</td>" +
      "<td>" + (p.serveZone || "—") + "</td>" +
      "<td style='color:#c0392b'>" + fault + "</td>" +
      "<td>" + (p.returnHand || "—") + "</td>" +
      "<td>" + (p.returnLandZone || "—") + "</td>" +
      "<td>" + (p.servePlusOne || "—") + "</td>" +
      "<td>" + (p.returnPlusOne || "—") + "</td>" +
      "<td>" + (p.rallyLength || "—") + "</td>" +
      "<td class='" + cls + "'>" + ocLabel + "</td>" +
      "<td><b>" + win + "</b></td>" +
      "<td>" + (p.netApproach ? "✓" : "") + "</td>" +
      "<td style='color:#c0392b'>" + (p.pressurePoint ? "●" : "") + "</td>" +
      "</tr>";
  }

  const css = [
    "*{box-sizing:border-box;margin:0;padding:0}",

    ".hdr h1{font-size:19px;font-weight:900}.hdr .meta{font-size:10px;opacity:.8;margin-top:2px}",
    ".dur{font-size:17px;font-weight:800;color:#f4d35e;margin-top:3px}",
    ".score-box{background:#f0f4f8;border-radius:8px;padding:10px 16px;margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}",

// ─── VOICE TAGGING ENGINE ─────────────────────────────────────────────────────
// Uses Web Speech API (webkitSpeechRecognition) for hands-free courtside tagging.
// Supported on iPad Safari (requires internet for speech processing).
const VoiceEngine = {
  _recognition: null,
  _active: false,
  _onCommand: null,
  _onStatus: null,

  isSupported: function() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },

  start: function(onCommand, onStatus) {
    if (!this.isSupported()) {
      if (onStatus) onStatus("unsupported");
      return false;
    }
    if (this._active) return true;

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    this._recognition = new SR();
    this._recognition.continuous = true;
    this._recognition.interimResults = false;
    this._recognition.lang = "en-US";
    this._recognition.maxAlternatives = 3;
    this._onCommand = onCommand;
    this._onStatus = onStatus;

    this._recognition.onresult = (event) => {
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          const raw = event.results[i][0].transcript.trim().toLowerCase();
          const confidence = event.results[i][0].confidence;
          console.log("🎤 Heard:", raw, "(" + Math.round(confidence * 100) + "%)");
          const cmd = this._parseCommand(raw);
          if (cmd && this._onCommand) {
            this._onCommand(cmd, raw, confidence);
          }
        }
      }
    };

    this._recognition.onerror = (event) => {
      console.warn("🎤 Error:", event.error);
      if (event.error === "not-allowed") {
        if (this._onStatus) this._onStatus("denied");
        this._active = false;
      } else if (event.error === "network") {
        if (this._onStatus) this._onStatus("offline");
      }
    };

    this._recognition.onend = () => {
      // Auto-restart if still active (speech recognition stops after silence)
      if (this._active) {
        try { this._recognition.start(); } catch(e) {}
      }
    };

    try {
      this._recognition.start();
      this._active = true;
      if (onStatus) onStatus("listening");
      return true;
    } catch(e) {
      console.error("🎤 Start failed:", e);
      if (onStatus) onStatus("error");
      return false;
    }
  },

  stop: function() {
    this._active = false;
    if (this._recognition) {
      try { this._recognition.stop(); } catch(e) {}
    }
    if (this._onStatus) this._onStatus("stopped");
  },

  // ── Parse spoken words into structured commands ──
  _parseCommand: function(raw) {
    // Normalize common speech-to-text variations
    const text = raw
      .replace(/1st/g, "first").replace(/2nd/g, "second")
      .replace(/double fault/g, "doublefault")
      .replace(/unforced error/g, "unforcederror")
      .replace(/forced error/g, "forcederror")
      .replace(/return error/g, "returnerror")
      .replace(/return winner/g, "returnwinner")
      .replace(/drop shot/g, "dropshot")
      .replace(/down the line/g, "downtheline")
      .replace(/cross court/g, "crosscourt")
      .replace(/cross-court/g, "crosscourt");

    const words = text.split(/\s+/);
    const has = (w) => words.some(x => x.includes(w));

    // ── Quick outcomes (highest priority) ──
    if (has("ace") || has("aces")) return { action: "quickTag", outcome: "Ace" };
    if (has("doublefault") || (has("double") && has("fault"))) return { action: "quickTag", outcome: "Double Fault" };
    if (has("returnerror") || (has("return") && has("error"))) return { action: "quickTag", outcome: "Return Error" };
    if (has("returnwinner") || (has("return") && has("winner"))) return { action: "quickTag", outcome: "Return Winner" };
    if (has("let") && !has("left")) return { action: "let" };

    // ── Compound quick commands: "ace wide" / "ace tee" ──
    // (handled by quickTag + zone in same utterance — quickTag takes priority, zone set separately)

    // ── Fault ──
    if (has("fault") && !has("double") && !has("foot")) {
      // Check for fault type in same phrase: "fault net" / "fault long" / "fault wide"
      if (has("net")) return { action: "faultWithType", type: "Net" };
      if (has("long")) return { action: "faultWithType", type: "Long" };
      return { action: "fault" };
    }
    if (has("foot") && has("fault")) return { action: "faultType", type: "Foot Fault" };
    if (has("net") && has("fault")) return { action: "faultType", type: "Net" };

    // ── Serve type ──
    if (has("first") && has("serve")) return { action: "setServe", type: "1st Serve" };
    if (has("second") && has("serve")) return { action: "setServe", type: "2nd Serve" };

    // ── Outcomes ──
    if (has("winner")) return { action: "setOutcome", outcome: "Winner" };
    if (has("unforcederror") || has("unforced")) return { action: "setOutcome", outcome: "Unforced Error" };
    if (has("forcederror") || (has("forced") && has("error"))) return { action: "setOutcome", outcome: "Forced Error" };
    if (has("error") && !has("return") && !has("forced") && !has("unforced")) return { action: "setOutcome", outcome: "Unforced Error" };

    // ── Serve spin ──
    if (has("flat") && !has("flat out")) return { action: "setSpin", spin: "Flat" };
    if (has("slice") && !has("slice forehand") && !has("slice backhand")) return { action: "setSpin", spin: "Slice" };
    if (has("kick")) return { action: "setSpin", spin: "Kick" };
    if (has("underarm") || has("under arm") || has("underhand")) return { action: "setSpin", spin: "Underarm" };

    // ── Serve zone (3 zones: Wide, Body, T) ──
    if (has("wide")) return { action: "setZone", zone: "Wide" };
    if (has("body") && !has("nobody")) return { action: "setZone", zone: "Body" };
    if (has("tee") || text === "t" || (has("center") && has("serve")) || has("middle")) return { action: "setZone", zone: "T" };

    // ── Shot types (context-aware: error vs winner) ──
    if (has("forehand") && has("volley")) return { action: "setShot", shot: "Volley Forehand" };
    if (has("backhand") && has("volley")) return { action: "setShot", shot: "Volley Backhand" };
    if (has("slice") && has("forehand")) return { action: "setShot", shot: "Slice Forehand" };
    if (has("slice") && has("backhand")) return { action: "setShot", shot: "Slice Backhand" };
    if (has("approach") && has("forehand")) return { action: "setShot", shot: "Approach Forehand" };
    if (has("approach") && has("backhand")) return { action: "setShot", shot: "Approach Backhand" };
    if (has("forehand")) return { action: "setShot", shot: "Forehand" };
    if (has("backhand")) return { action: "setShot", shot: "Backhand" };
    if (has("volley")) return { action: "setShot", shot: "Volley" };
    if (has("overhead") || has("smash")) return { action: "setShot", shot: "Overhead" };
    if (has("dropshot") || (has("drop") && has("shot"))) return { action: "setShot", shot: "Drop Shot" };
    if (has("lob")) return { action: "setShot", shot: "Lob" };
    if (has("tweener") || has("between") && has("legs")) return { action: "setShot", shot: "Tweener" };
    if (has("half") && has("volley")) return { action: "setShot", shot: "Half Volley" };

    // ── Return hand ──
    if (has("return") && has("forehand")) return { action: "setReturnHand", hand: "Forehand" };
    if (has("return") && has("backhand")) return { action: "setReturnHand", hand: "Backhand" };

    // ── Error direction ──
    if (has("into") && has("net")) return { action: "setErrorDir", dir: "Net" };
    if (has("in") && has("net") && !has("winner")) return { action: "setErrorDir", dir: "Net" };
    if (has("long") && !has("rally")) return { action: "setErrorDir", dir: "Long" };
    if (has("out") && !has("long") && !has("rally")) return { action: "setErrorDir", dir: "Wide" };

    // ── Rally length ──
    if (has("short") && has("rally")) return { action: "setRally", rally: "0-4" };
    if (has("medium") && has("rally")) return { action: "setRally", rally: "5-8" };
    if (has("long") && has("rally")) return { action: "setRally", rally: "9-12" };
    if (has("very") && has("long")) return { action: "setRally", rally: "13+" };

    // ── Net approach ──
    if (has("net") && has("approach")) return { action: "netApproach", who: "server" };
    if (has("approach") && has("net")) return { action: "netApproach", who: "server" };
    if (has("came") && has("net")) return { action: "netApproach", who: "server" };
    if (has("serve") && has("volley")) return { action: "netApproach", who: "server" };

    // ── Direction (serve+1 / return+1) ──
    if (has("crosscourt") || has("cross")) return { action: "setDirection", dir: "Cross-Court" };
    if (has("downtheline") || (has("down") && has("line"))) return { action: "setDirection", dir: "Down-the-Line" };

    // ── Point winner ──
    if (has("server") && (has("wins") || has("won") || has("point"))) return { action: "setWinner", winner: "server" };
    if (has("returner") && (has("wins") || has("won") || has("point"))) return { action: "setWinner", winner: "returner" };
    if (has("player") && has("one")) return { action: "setWinner", winner: "server" };
    if (has("player") && has("two")) return { action: "setWinner", winner: "returner" };

    // ── Controls ──
    if (has("undo") || has("take") && has("back")) return { action: "undo" };
    if (has("redo")) return { action: "redo" };
    if (has("log") || has("lock") || has("confirm") || has("done") || has("next")) return { action: "log" };
    if (has("flip") || has("rotate") || has("switch") && has("end")) return { action: "flip" };
    if (has("edit") || has("correct")) return { action: "editLast" };
    if (has("pause")) return { action: "pause" };
    if (has("resume")) return { action: "resume" };
    if (has("full") && has("width") || has("expand")) return { action: "fullWidth" };
    if (has("split") || has("show") && has("log")) return { action: "splitView" };

    return null; // unrecognized
  },
};

// ── Voice status indicator component ──
function VoiceBadge({ active, lastCmd, onToggle, T }) {
  return React.createElement('div', { style: { display: "flex", alignItems: "center", gap: 5, flexShrink: 0 },}
    , React.createElement('button', { onClick: onToggle, style: {
      padding: "5px 10px", borderRadius: T.chipRadius || 8, fontSize: 11, fontWeight: 700,
      cursor: "pointer", transition: "all 0.2s",
      border: "1.5px solid " + (active ? "#52c41a" : T.border),
      background: active ? "#52c41a20" : "transparent",
      color: active ? "#52c41a" : T.textMuted,
      animation: active ? "pulse 1s ease-in-out infinite alternate" : "none",
    },}
      , active ? "🎤 Listening" : "🎤 Voice"
    )
    , lastCmd && React.createElement('span', { style: {
      fontSize: 9, color: "#52c41a", fontWeight: 600, padding: "2px 6px",
      borderRadius: 4, background: "#52c41a15", border: "1px solid #52c41a30",
      maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
    },}, "✓ " + lastCmd)
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [setup, setSetup] = useState(null);
  const [tab, setTab] = useState("tag");
  const [tag, setTag] = useState(EMPTY_TAG);
  const [points, setPoints] = useState([]);
  const [score, setScore] = useState(null);
  const [superTieAt11, setSuperTieAt11] = useState(false);
  const [showSuperTieModal, setShowSuperTieModal] = useState(false);
  const [matchTime, setMatchTime] = useState({ start: null, end: null });
  const [conditions, setConditions] = useState("");
  const [editCond, setEditCond] = useState(false);
  const [themeId, setThemeId] = useState("original");
  const T = THEMES[themeId] || THEMES.original;
  const [showOverwrite, setShowOverwrite] = useState(false);
  const [logFlash, setLogFlash] = useState(false);
  const [courtFlipped, setCourtFlipped] = useState(false);
  const [tagFullWidth, setTagFullWidth] = useState(false);
  const [voiceActive, setVoiceActive] = useState(false);
  const [voiceLastCmd, setVoiceLastCmd] = useState(null);
  const handleFlipCourt = () => {
    setCourtFlipped(f => !f);
  };

  const canTriggerSuperTie = (fmt) => ["Best of 3","Best of 3 Short Sets"].includes(fmt);

  // ── CLOUD STORAGE STATE ────────────────────────────────────────
  const [cloudUser, setCloudUser] = useState(null);
  const [showAuthModal, setShowAuthModal] = useState(false);
  const [cloudReady, setCloudReady] = useState(false);

  // Initialize cloud on mount
  useEffect(() => {
    if (!CLOUD_ENABLED) return;
    CloudStorage.init().then(ok => {
      setCloudReady(ok);
      if (ok) {
        CloudStorage.onAuthChange(user => {
          setCloudUser(user);
        });
      }
    });
  }, []);

  // ── TAG PANEL SCROLL REF ─────────────────────────────────────────
  const tagPanelRef = useRef(null);

  // ── LOCAL SAVE / RESTORE ──────────────────────────────────────────
  const SAVE_KEY = "tennistag_session";

  const saveSession = useCallback((pts, sc, su, mt, cond, tid, extras) => {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        points: pts, score: sc, setup: su,
        matchTime: mt, conditions: cond, themeId: tid,
        superTieAt11: extras.superTieAt11 || false,
        courtFlipped: extras.courtFlipped || false,
        currentTag: extras.currentTag || null,
        savedAt: Date.now(),
      }));
    } catch(e) { /* storage full or unavailable */ }
  }, []);

  const [savedSession, setSavedSession] = useState(() => {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      // Only restore if saved within last 24 hours
      if (Date.now() - s.savedAt > 86400000) { localStorage.removeItem(SAVE_KEY); return null; }
      return s;
    } catch(e) { return null; }
  });

  const [showRestore, setShowRestore] = useState(!!savedSession);

  const restoreSession = () => {
    if (!savedSession) return;
    setSetup(savedSession.setup);
    setPoints(savedSession.points || []);
    setScore(savedSession.score);
    setMatchTime(savedSession.matchTime || { start: null, end: null });
    setConditions(savedSession.conditions || "");
    setThemeId(savedSession.themeId || "original");
    setSuperTieAt11(savedSession.superTieAt11 || false);
    setCourtFlipped(savedSession.courtFlipped || false);
    if (savedSession.currentTag) setTag(savedSession.currentTag);
    setSavedSession(null);
    setShowRestore(false);
    setTab("tag");
  };

  const discardSession = () => {
    localStorage.removeItem(SAVE_KEY);
    setSavedSession(null);
    setShowRestore(false);
  };

  // Auto-save whenever key state changes (debounced)
  const saveTimerRef = useRef(null);
  useEffect(() => {
    if (!setup) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      saveSession(points, score, setup, matchTime, conditions, themeId, {
        superTieAt11, courtFlipped, currentTag: tag,
      });
      // Cloud auto-save (if authenticated)
      if (CLOUD_ENABLED && cloudUser) {
        const sessionKey = setup.player1.replace(/[^a-zA-Z0-9]/g,"") + "_" + setup.date;
        CloudStorage.autoSave(sessionKey, {
          setup, points, score, matchTime, conditions, themeId,
        });
      }
    }, 2000); // debounce: save every 2 seconds max
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [points, score, matchTime, conditions, themeId, setup, superTieAt11, courtFlipped, tag, cloudUser]);

  const handleStart = (form) => {
    localStorage.removeItem("tennistag_session");
    setSetup(form);
    setConditions(form.conditions || "");
    setSuperTieAt11(false);
    setShowSuperTieModal(false);
    setScore(rebuildScore([], form.format, false));
    setPoints([]);
    setMatchTime({ start: Date.now(), end: null, pausedMs: 0, pausedAt: null });
    setTag(EMPTY_TAG);
    setTab("tag");
  };

  const handleLog = () => {
    // Compute resolved values (auto-fills for ace/df/return outcomes)
    const srv = score.server;
    const isAutoOutcome = tag.outcome === "Ace" || tag.outcome === "Double Fault" || tag.outcome === "Return Error" || tag.outcome === "Return Winner";
    const autoW = tag.outcome === "Ace" || tag.outcome === "Return Error" ? srv
      : tag.outcome === "Double Fault" || tag.outcome === "Return Winner" ? (srv === "p1" ? "p2" : "p1")
      : tag.pointWinner;
    const autoR = isAutoOutcome ? "0-4" : tag.rallyLength;
    if (!autoW) return; // still need a point winner
    // ── Auto-detect pressure point from current score ──
    const autoPressure = detectPressurePoint(score, setup.format);
    const newPoint = {
      ...tag,
      id: Date.now() + "-" + points.length,
      timestamp: Date.now(),
      server: srv,
      serveSide: deriveServeSide(score.points),
      pointWinner: autoW,
      rallyLength: autoR,
      pressurePoint: tag.pressurePoint || autoPressure,
      // Map relative return zone → absolute court position
      returnLandAbsolute: (function() {
        const rz = tag.returnLandZone;
        if (!rz || rz === "Net") return rz || "";
        const side = deriveServeSide(score.points);
        const isDeuce = side === "Deuce";
        // Relative: Cross/Down-line/Centre × Deep/Mid
        // Absolute: Deuce-side/Ad-side/Centre × Deep/Mid
        const parts = rz.split("-");
        const dir = parts[0]; // Cross, Down-line, Centre
        const depth = parts.slice(1).join("-"); // Deep, Mid
        if (dir === "Centre") return "Centre-" + depth;
        // Deuce side: Down-line=Ad-side, Cross=Deuce-side
        // Ad side: Down-line=Deuce-side, Cross=Ad-side
        if (isDeuce) {
          return (dir === "Down-line" ? "Ad-side" : "Deuce-side") + "-" + depth;
        } else {
          return (dir === "Down-line" ? "Deuce-side" : "Ad-side") + "-" + depth;
        }
      })(),
      // Score snapshot at the time this point was played
      scoreSnapshot: {
        sets: JSON.parse(JSON.stringify(score.sets)),
        games: { p1: score.games.p1, p2: score.games.p2 },
        points: { p1: score.points.p1, p2: score.points.p2 },
        setNum: score.currentSet + 1,
        tieBreak: score.tieBreak || false,
        superTieBreak: score.superTieBreak || false,
      },
    };
    const newPoints = [...points, newPoint];
    setPoints(newPoints);
    const newScore = rebuildScore(newPoints, setup.format, superTieAt11);
    setScore(newScore);
    // Detect 1-1: if a new set just started and it's the 3rd set, prompt for super tie-break
    if (canTriggerSuperTie(setup.format) && !superTieAt11 && !showSuperTieModal) {
      const p1sets = newScore.sets.filter((st, i) => i < newScore.currentSet && st.p1 > st.p2).length;
      const p2sets = newScore.sets.filter((st, i) => i < newScore.currentSet && st.p2 > st.p1).length;
      if (p1sets === 1 && p2sets === 1 && newScore.currentSet === 2 && !newScore.matchWinner) {
        setShowSuperTieModal(true);
      }
    }
    setTag({ ...EMPTY_TAG, serveType: "1st Serve" });
    // Haptic feedback (iPad) + visual flash
    if (navigator.vibrate) navigator.vibrate(50);
    setLogFlash(true);
    setTimeout(() => setLogFlash(false), 400);
    // Auto-scroll tag panel back to top
    if (tagPanelRef.current) tagPanelRef.current.scrollTop = 0;
  };

  const handleSuperTieDecision = (useSuperTie) => {
    setSuperTieAt11(useSuperTie);
    setShowSuperTieModal(false);
    // Rebuild score with the new super tie decision
    setScore(rebuildScore(points, setup.format, useSuperTie));
  };

  const [undoStack, setUndoStack] = useState([]);
  const [undoPending, setUndoPending] = useState(false);
  const undoTimerRef = useRef(null);

  const handleUndo = () => {
    if (!points.length) return;
    if (!undoPending) {
      // First tap — show confirmation briefly
      setUndoPending(true);
      undoTimerRef.current = setTimeout(() => setUndoPending(false), 2000);
      return;
    }
    // Second tap within 2s — actually undo
    clearTimeout(undoTimerRef.current);
    setUndoPending(false);
    const removed = points[points.length - 1];
    const np = points.slice(0, -1);
    setPoints(np);
    setScore(rebuildScore(np, setup.format, superTieAt11));
    setUndoStack(prev => [...prev.slice(-4), removed]); // keep last 5
  };

  const handleRedo = () => {
    if (!undoStack.length) return;
    const restored = undoStack[undoStack.length - 1];
    const np = [...points, restored];
    setPoints(np);
    setScore(rebuildScore(np, setup.format, superTieAt11));
    setUndoStack(prev => prev.slice(0, -1));
  };

  const handleEditLast = () => {
    if (!points.length) return;
    const lastPoint = points[points.length - 1];
    // Remove last point and rebuild score
    const np = points.slice(0, -1);
    setPoints(np);
    setScore(rebuildScore(np, setup.format, superTieAt11));
    // Load the point's tag data back into the form for editing
    setTag({
      serveType: lastPoint.serveType || null,
      serveSpin: lastPoint.serveSpin || null,
      serveSide: lastPoint.serveSide || null,
      serveZone: lastPoint.serveZone || null,
      serveFault: lastPoint.serveFault || null,
      dfFaultType: lastPoint.dfFaultType || null,
      returnHand: lastPoint.returnHand || null,
      returnPosition: lastPoint.returnPosition || null,
      returnLandZone: lastPoint.returnLandZone || null,
      servePlusOne: lastPoint.servePlusOne || null,
      sp1Dir: lastPoint.sp1Dir || null,
      returnPlusOne: lastPoint.returnPlusOne || null,
      rp1Dir: lastPoint.rp1Dir || null,
      rallyLength: lastPoint.rallyLength || null,
      outcome: lastPoint.outcome || null,
      shotType: lastPoint.shotType || null,
      errorShot: lastPoint.errorShot || null,
      errorDirection: lastPoint.errorDirection || null,
      netApproach: lastPoint.netApproach || false,
      netPlayer: lastPoint.netPlayer || null,
      pressurePoint: lastPoint.pressurePoint || false,
      pointWinner: lastPoint.pointWinner || null,
    });
  };

  const handleOverwriteApply = (correctedScore) => {
    setScore(correctedScore);
    setShowOverwrite(false);
  };

  const [showEndConfirm, setShowEndConfirm] = useState(false);

  const handleEndMatch = () => setShowEndConfirm(true);

  const handlePauseToggle = () => {
    setMatchTime(prev => {
      if (prev.pausedAt) {
        // Resume: add paused duration to total pausedMs
        const additionalPause = Date.now() - prev.pausedAt;
        return { ...prev, pausedAt: null, pausedMs: (prev.pausedMs || 0) + additionalPause };
      } else {
        // Pause: record when we paused
        return { ...prev, pausedAt: Date.now() };
      }
    });
  };

  const confirmEndMatch = () => {
    const endTime = matchTime.end || Date.now();
    if (!matchTime.end) setMatchTime(prev => ({ ...prev, end: endTime }));
    setShowEndConfirm(false);
    setTab("stats");
    // Save to local match history
    try {
      const historyRaw = localStorage.getItem("tennistag_history");
      const history = historyRaw ? JSON.parse(historyRaw) : [];
      history.unshift({
        id: "match_" + endTime,
        setup: setup,
        pointCount: points.length,
        score: score,
        matchTime: { start: matchTime.start, end: endTime },
        conditions: conditions,
        savedAt: endTime,
        matchComplete: true,
      });
      // Keep last 50 matches in history
      localStorage.setItem("tennistag_history", JSON.stringify(history.slice(0, 50)));
    } catch(e) { /* history save failed */ }
    // Cloud save if enabled
    if (CLOUD_ENABLED) {
      CloudStorage.saveMatch({
        setup, points, score,
        matchTime: { start: matchTime.start, end: endTime },
        conditions, themeId,
      });
    }
  };

  const [showHistory, setShowHistory] = useState(false);

  // ── KEYBOARD SHORTCUTS ─────────────────────────────────────────
  useEffect(() => {
    if (!setup) return;
    const handleKeyDown = (e) => {
      // Don't intercept if user is typing in an input/textarea
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      // Enter → Log point
      if (e.key === "Enter" && tab === "tag") {
        e.preventDefault();
        handleLog();
        return;
      }
      // Ctrl+Z or Cmd+Z → Undo
      if ((e.ctrlKey || e.metaKey) && e.key === "z") {
        e.preventDefault();
        handleUndo();
        return;
      }
      // Ctrl+Shift+Z or Cmd+Shift+Z → Redo
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "Z") {
        e.preventDefault();
        handleRedo();
        return;
      }
      // Number keys 1-4 → Rally length (only in tag tab)
      if (tab === "tag" && !e.ctrlKey && !e.metaKey) {
        const rallyMap = { "1": "0-4", "2": "5-8", "3": "9-12", "4": "13+" };
        if (rallyMap[e.key]) {
          e.preventDefault();
          setTag(prev => ({ ...prev, rallyLength: prev.rallyLength === rallyMap[e.key] ? null : rallyMap[e.key] }));
          return;
        }
        // 'a' → Ace quick-tag, 'd' → Double fault, 'w' → Winner outcome
        if (e.key === "a") { setTag(prev => ({ ...prev, serveType: prev.serveType || "1st Serve", outcome: "Ace", pointWinner: score.server, rallyLength: "0-4" })); return; }
        if (e.key === "d") { setTag(prev => ({ ...prev, serveType: prev.serveType || "1st Serve", outcome: "Double Fault", pointWinner: score.server === "p1" ? "p2" : "p1", rallyLength: "0-4" })); return; }
      }
    };
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [setup, tab, tag, score, points]);

  // ── VOICE COMMAND HANDLER ────────────────────────────────────────
  const handleVoiceToggle = () => {
    if (voiceActive) {
      VoiceEngine.stop();
      setVoiceActive(false);
      setVoiceLastCmd(null);
    } else {
      const ok = VoiceEngine.start((cmd, raw, confidence) => {
        // Process voice command
        setVoiceLastCmd(raw.slice(0, 20));
        setTimeout(() => setVoiceLastCmd(null), 3000);

        const srv = score ? score.server : "p1";
        const returner = srv === "p1" ? "p2" : "p1";

        switch (cmd.action) {
          case "quickTag":
            setTag(prev => ({
              ...EMPTY_TAG,
              serveType: prev.serveType || "1st Serve",
              outcome: cmd.outcome,
              pointWinner: (cmd.outcome === "Ace" || cmd.outcome === "Return Error") ? srv : returner,
              rallyLength: "0-4",
              serveSpin: prev.serveSpin,
              serveZone: prev.serveZone,
            }));
            // Auto-log after a brief delay for confirmation flash
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            setTimeout(() => handleLog(), 300);
            break;
          case "let":
            setTag(prev => ({ ...EMPTY_TAG, serveType: prev.serveType || "1st Serve" }));
            break;
          case "fault":
            setTag(prev => ({ ...prev, serveType: prev.serveType || "1st Serve", serveFault: "?" }));
            break;
          case "faultType":
            setTag(prev => ({ ...prev, serveFault: cmd.type }));
            break;
          case "setServe":
            setTag(prev => ({ ...prev, serveType: cmd.type }));
            break;
          case "setOutcome":
            setTag(prev => ({ ...prev, outcome: cmd.outcome }));
            break;
          case "setSpin":
            setTag(prev => ({ ...prev, serveSpin: cmd.spin }));
            break;
          case "setZone":
            setTag(prev => ({ ...prev, serveZone: cmd.zone }));
            break;
          case "setShot":
            // Context-aware: if outcome is error, set errorShot; if winner, set shotType
            setTag(prev => {
              if (prev.outcome === "Unforced Error" || prev.outcome === "Forced Error" || prev.outcome === "Return Error") {
                return { ...prev, errorShot: cmd.shot };
              }
              return { ...prev, shotType: cmd.shot };
            });
            break;
          case "setErrorDir":

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error: error };
  }
  componentDidCatch(error, errorInfo) {
    console.error("TennisTag Error:", error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: {
        position: "fixed", inset: 0, background: "#0d1b2a",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",

        React.createElement('div', { style: { fontSize: 48, marginBottom: 16 }}, "🎾"),

          String(this.state.error)),

  }
}
