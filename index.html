// ─── CLOUD STORAGE MODULE ────────────────────────────────────────────────────
// Firebase Firestore + Auth integration for match persistence and sync.
//
// ── SETUP INSTRUCTIONS ──
// 1. Go to https://console.firebase.google.com
// 2. Create a new project (or use existing)
// 3. Add a Web App (Settings → General → Your apps → Add app → Web)
// 4. Copy the firebaseConfig object and paste below
// 5. Enable Authentication → Sign-in method → Email/Password (enable)
// 6. Enable Authentication → Sign-in method → Anonymous (enable)
// 7. Create Firestore Database (Cloud Firestore → Create database → Start in test mode)
// 8. Set CLOUD_ENABLED = true below
// 9. Deploy Firestore security rules (see FIRESTORE_RULES below)
//
const CLOUD_ENABLED = false; // ← Set to true after Firebase is configured
const FIREBASE_CONFIG = {
  // ← Paste your Firebase config here:
  // apiKey: "AIza...",
  // authDomain: "your-project.firebaseapp.com",
  // projectId: "your-project-id",
  // storageBucket: "your-project.appspot.com",
  // messagingSenderId: "123456789",

};

const CloudStorage = {
  _db: null,
  _auth: null,
  _user: null,
  _initialized: false,
  _listeners: [],
  _syncStatus: "idle", // idle | syncing | synced | error | offline

  // ── Initialize Firebase + Auth + Firestore ──────────────────
  init: async function() {
    if (!CLOUD_ENABLED || this._initialized) return false;
    try {
      // Dynamically load Firebase SDK (compat version for simpler API)
      if (typeof firebase === "undefined") {
        await this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js");
        await Promise.all([
          this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"),
          this._loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"),
        ]);
      }
      // Initialize app (only once)
      if (!firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      this._auth = firebase.auth();
      this._db = firebase.firestore();

      // Enable offline persistence (cache-first for courtside use)
      try {
        await this._db.enablePersistence({ synchronizeTabs: true });
        console.log("☁️ Offline persistence enabled");
      } catch (e) {
        if (e.code === "failed-precondition") {
          console.warn("☁️ Multiple tabs open — persistence limited to one tab");
        } else if (e.code === "unimplemented") {
          console.warn("☁️ Browser doesn't support persistence");
        }
      }

      // Listen for online/offline status
      this._db.enableNetwork().catch(() => {});
      window.addEventListener("online", () => {
        this._db.enableNetwork();
        this._syncStatus = "syncing";
        this._notifyListeners();
      });
      window.addEventListener("offline", () => {
        this._syncStatus = "offline";
        this._notifyListeners();
      });

      this._initialized = true;
      console.log("☁️ Cloud storage initialized");
      return true;
    } catch (e) {
      console.error("☁️ Init failed:", e);
      return false;
    }
  },

  _loadScript: function(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  },

  // ── Sync status listeners ───────────────────────────────────
  onSyncChange: function(callback) {
    this._listeners.push(callback);
    return () => { this._listeners = this._listeners.filter(l => l !== callback); };
  },
  _notifyListeners: function() {
    this._listeners.forEach(l => l(this._syncStatus));
  },

  // ── AUTH: Sign up with email/password ───────────────────────
  signUp: async function(email, password, displayName) {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.createUserWithEmailAndPassword(email, password);
      if (displayName) {
        await cred.user.updateProfile({ displayName: displayName });
      }
      this._user = cred.user;
      // Create user profile document
      await this._db.collection("users").doc(cred.user.uid).set({
        email: email,
        displayName: displayName || "",
        createdAt: Date.now(),
      }, { merge: true });
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Sign in with email/password ───────────────────────
  signIn: async function(email, password) {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.signInWithEmailAndPassword(email, password);
      this._user = cred.user;
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Anonymous sign-in (no account needed) ─────────────
  signInAnonymous: async function() {
    if (!this._auth) return { error: "Not initialized" };
    try {
      const cred = await this._auth.signInAnonymously();
      this._user = cred.user;
      return { user: cred.user };
    } catch (e) {
      return { error: e.message };
    }
  },

  // ── AUTH: Sign out ──────────────────────────────────────────
  signOut: async function() {
    if (!this._auth) return;
    try {
      await this._auth.signOut();
      this._user = null;
    } catch (e) { console.error("Sign out failed:", e); }
  },

  // ── AUTH: Get current user ──────────────────────────────────
  getUser: function() { return this._user || (this._auth && this._auth.currentUser); },

  // ── AUTH: Listen for auth state changes ─────────────────────
  onAuthChange: function(callback) {
    if (!this._auth) return () => {};
    return this._auth.onAuthStateChanged(user => {
      this._user = user;
      callback(user);
    });
  },

  // ── Helper: get user-scoped collection path ─────────────────
  _userPath: function() {
    const uid = this.getUser() && this.getUser().uid;
    if (!uid) throw new Error("Not authenticated");
    return "users/" + uid;
  },

  // ── MATCHES: Save a complete match ──────────────────────────
  saveMatch: async function(matchData) {
    if (!this._db || !this.getUser()) return null;
    try {
      this._syncStatus = "syncing";
      this._notifyListeners();
      const docId = matchData.setup.player1.replace(/[^a-zA-Z0-9]/g, "") + "_vs_" +
                    matchData.setup.player2.replace(/[^a-zA-Z0-9]/g, "") + "_" +
                    matchData.setup.date + "_" + Date.now();
      const doc = {
        setup: matchData.setup,
        points: matchData.points,
        score: matchData.score,
        matchTime: matchData.matchTime,
        conditions: matchData.conditions || "",
        themeId: matchData.themeId || "original",
        savedAt: Date.now(),
        pointCount: matchData.points.length,
        matchComplete: !!matchData.matchTime.end,
        userId: this.getUser().uid,
      };
      await this._db.doc(this._userPath() + "/matches/" + docId).set(doc);
      this._syncStatus = "synced";
      this._notifyListeners();
      console.log("☁️ Match saved:", docId);
      return docId;
    } catch (e) {
      this._syncStatus = "error";
      this._notifyListeners();
      console.error("☁️ Save failed:", e);
      return null;
    }
  },

  // ── MATCHES: Auto-save active session ───────────────────────
  autoSave: async function(sessionKey, matchData) {
    if (!this._db || !this.getUser()) return false;
    try {
      await this._db.doc(this._userPath() + "/sessions/" + sessionKey).set({
        ...matchData,
        savedAt: Date.now(),
        userId: this.getUser().uid,
      }, { merge: true });
      return true;
    } catch (e) {
      console.warn("☁️ Auto-save failed:", e);
      return false;
    }
  },

  // ── MATCHES: List all saved matches ─────────────────────────
  listMatches: async function() {
    if (!this._db || !this.getUser()) return [];
    try {
      const snap = await this._db.collection(this._userPath() + "/matches")
        .orderBy("savedAt", "desc")
        .limit(100)
        .get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {
      console.error("☁️ List failed:", e);
      return [];
    }
  },

  // ── MATCHES: Load a specific match ──────────────────────────
  loadMatch: async function(docId) {
    if (!this._db || !this.getUser()) return null;
    try {
      const doc = await this._db.doc(this._userPath() + "/matches/" + docId).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    } catch (e) {
      console.error("☁️ Load failed:", e);
      return null;
    }
  },

  // ── MATCHES: Delete a match ─────────────────────────────────
  deleteMatch: async function(docId) {
    if (!this._db || !this.getUser()) return false;
    try {
      await this._db.doc(this._userPath() + "/matches/" + docId).delete();
      return true;
    } catch (e) {
      console.error("☁️ Delete failed:", e);
      return false;
    }
  },

  // ── MATCHES: Share a match (copy to /shared collection) ─────
  shareMatch: async function(docId) {
    if (!this._db || !this.getUser()) return null;
    try {
      const match = await this.loadMatch(docId);
      if (!match) return null;
      const shareId = "share_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      await this._db.doc("shared/" + shareId).set({
        ...match,
        sharedBy: this.getUser().uid,
        sharedByName: this.getUser().displayName || this.getUser().email || "Anonymous",
        sharedAt: Date.now(),
      });
      return shareId;
    } catch (e) {
      console.error("☁️ Share failed:", e);
      return null;
    }
  },

  // ── MATCHES: Load a shared match (no auth needed for read) ──
  loadSharedMatch: async function(shareId) {
    if (!this._db) return null;
    try {
      const doc = await this._db.doc("shared/" + shareId).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    } catch (e) {
      console.error("☁️ Load shared failed:", e);
      return null;
    }
  },
};

function CloudAuthModal({ onAuth, onClose, onSkip, T = THEMES.original }) {
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError(null);
    setLoading(true);
    let result;
    if (mode === "signup") {
      result = await CloudStorage.signUp(email, password, name);
    } else {
      result = await CloudStorage.signIn(email, password);
    }
    setLoading(false);
    if (result.error) {
      setError(result.error);
    } else {
      onAuth(result.user);
    }
  };

  const handleAnonymous = async () => {

function fmtDuration(ms) {
  if (!ms || ms < 0) return "—";
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const sec = totalSec % 60;
  if (h > 0) return h + "h " + m + "m";
  return m + "m " + String(sec).padStart(2,"0") + "s";
}
function fmtTime(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function pct(n, d) { return d ? Math.round((n / d) * 100) : 0; }

// Derive serve side from current point score
// Regular games: Deuce = even total points, Ad = odd
// Tiebreaks/Super TB: numeric scores, same even/odd rule
function deriveServeSide(scorePoints) {
  const p1v = scorePoints.p1;
  const p2v = scorePoints.p2;
  // Regular tennis scores - if values match these, use index-based math (NOT tiebreak)
  const TENNIS_SCORES = ["0", "15", "30", "40", "AD"];
  const isP1TennisScore = TENNIS_SCORES.includes(p1v);
  const isP2TennisScore = TENNIS_SCORES.includes(p2v);
  // Tiebreak mode: BOTH values must be numeric AND NEITHER is a regular tennis score string
  if (!isP1TennisScore && !isP2TennisScore) {
    const p1n = Number(p1v);
    const p2n = Number(p2v);
    if (!isNaN(p1n) && !isNaN(p2n)) {
      const total = p1n + p2n;
      return total % 2 === 0 ? "Deuce" : "Ad";
    }
  }
  // Regular game scoring — use sequence indices
  const seq = ["0","15","30","40","AD"];
  const p1i = seq.indexOf(p1v);
  const p2i = seq.indexOf(p2v);
  const total = (p1i >= 0 ? p1i : 0) + (p2i >= 0 ? p2i : 0);
  return total % 2 === 0 ? "Deuce" : "Ad";
}

// ─── SCORE LOGIC ──────────────────────────────────────────────────────────────

// ── AUTO PRESSURE POINT DETECTION ──────────────────────────────────────
// Returns true if the current score state is a pressure point:
//   Break point (returner can break), Set point, Match point, Deuce/Ad, 30-40
function detectPressurePoint(score, format) {
  if (!score || score.matchWinner) return false;
  const { sets, games, points, server, superTieBreak, currentSet } = score;
  const returner = server === "p1" ? "p2" : "p1";
  const sp = points[server];   // server's point score
  const rp = points[returner]; // returner's point score

  // ── Super tie-break pressure ──
  if (superTieBreak) {
    const sn = Number(sp) || 0;
    const rn = Number(rp) || 0;
    // Match point for either side (>=9 and leading by 1+)
    if ((sn >= 9 && sn > rn) || (rn >= 9 && rn > sn)) return true;
    return false;
  }

  // ── Point-level pressure ──
  // Deuce (40-40)
  if (sp === "40" && rp === "40") return true;
  // Ad situation (someone has AD)
  if (sp === "AD" || rp === "AD") return true;
  // 30-40 (server at 30, returner at 40 — break point)
  if (sp === "30" && rp === "40") return true;
  // 40-30 is not a break point but 30-40 from server's perspective is

  // ── Break point: returner at 40 or AD while server is not at AD ──
  const isBreakPoint = (rp === "40" && sp !== "40" && sp !== "AD") || (rp === "AD");

  // ── Check for set point / match point ──
  const gS = games[server];
  const gR = games[returner];
  const target = getSetTarget(format);
  const needed = setsNeeded(format);

  // Count sets won
  const setsWon = (pid) => sets.filter((st, i) => i < currentSet && st[pid] > st[pid === "p1" ? "p2" : "p1"]).length;

  // Is someone one game away from winning the set?
  // Server holds and could win: server has target-1 games and is at 40/AD
  // Returner breaks and could win: returner has target-1 games and has break point
  const serverCanWinGame = sp === "40" || sp === "AD";
  const returnerCanWinGame = isBreakPoint;

  const checkSetPoint = (pid, canWin) => {
    if (!canWin) return false;
    const gP = games[pid];
    const gO = games[pid === "p1" ? "p2" : "p1"];
    // Standard set point: player has >=target-1 games and leads by 1+ or at target-1 each (tiebreak next or win)
    if (gP >= target - 1 && gP >= gO && (gP - gO >= 1 || (gP === target - 1 && gO === target - 1))) {
      // At target-1 each, it's not a set point unless tiebreak scenario (target+1 vs target possible)
      if (gP === target - 1 && gO === target - 1) return false; // goes to tie territory
      return true;
    }
    // Tiebreak-level: gP=target, gO=target-1 or gP=target, gO=target
    if (gP >= target && gP - gO >= 1) return true;
    return false;
  };

  const serverSetPoint = checkSetPoint(server, serverCanWinGame);
  const returnerSetPoint = checkSetPoint(returner, returnerCanWinGame);

  // Match point: set point AND winning this set wins the match
  const checkMatchPoint = (pid, isSetPt) => {
    if (!isSetPt) return false;
    return setsWon(pid) >= needed - 1;
  };

  if (checkMatchPoint(server, serverSetPoint) || checkMatchPoint(returner, returnerSetPoint)) return true;
  if (serverSetPoint || returnerSetPoint) return true;
  if (isBreakPoint) return true;

  return false;
}

// Returns specific pressure type string for a given score state (used for CSV export)
// Priority: MatchPoint > SetPoint > BreakPoint > GamePoint > Deuce > ""
function detectPressurePointType(score, format) {
  if (!score || score.matchWinner) return "";
  const { sets, games, points, server, superTieBreak, currentSet } = score;
  const returner = server === "p1" ? "p2" : "p1";
  const sp = points[server], rp = points[returner];
  if (superTieBreak) {
    const sn = Number(sp) || 0, rn = Number(rp) || 0;
    if ((sn >= 9 && sn > rn) || (rn >= 9 && rn > sn)) return "MatchPoint";
    return "";
  }
  const isBreakPoint = (rp === "40" && sp !== "40" && sp !== "AD") || (rp === "AD");
  const isGamePoint = (sp === "40" && rp !== "40" && rp !== "AD") || (sp === "AD");
  const isDeuce = (sp === "40" && rp === "40");
  const target = getSetTarget(format);
  const needed = setsNeeded(format);
  const setsWon = (pid) => sets.filter((st, i) => i < currentSet && st[pid] > st[pid === "p1" ? "p2" : "p1"]).length;
  // Check set point for both sides
  const checkSetPt = (pid, canWin) => {
    if (!canWin) return false;
    const gP = games[pid], gO = games[pid === "p1" ? "p2" : "p1"];
    if (gP >= target - 1 && gP >= gO && (gP - gO >= 1 || (gP === target - 1 && gO === target - 1))) {
      if (gP === target - 1 && gO === target - 1) return false;
      return true;
    }
    if (gP >= target && gP - gO >= 1) return true;
    return false;
  };
  const serverSetPt = checkSetPt(server, isGamePoint);
  const returnerSetPt = checkSetPt(returner, isBreakPoint);
  // Match point = set point for someone with (needed-1) sets already won
  if ((serverSetPt && setsWon(server) >= needed - 1) || (returnerSetPt && setsWon(returner) >= needed - 1)) return "MatchPoint";
  if (serverSetPt || returnerSetPt) return "SetPoint";
  if (isBreakPoint) return "BreakPoint";
  if (isGamePoint) return "GamePoint";
  if (isDeuce) return "Deuce";
  return "";
}

function getSetTarget(format) {
  return (format === "Short Set (1st to 4)" || format === "Best of 3 Short Sets") ? 4 : 6;
}
function setsNeeded(format) {
  if (format === "Best of 5") return 3;
  if (format === "1 Set" || format === "Short Set (1st to 4)") return 1;
  return 2;
}

function rebuildScore(pts, fmt, superTieAt11, initialServer) {
  let sc = {
    sets: [{ p1: 0, p2: 0 }],
    games: { p1: 0, p2: 0 },
    points: { p1: "0", p2: "0" },
    currentSet: 0,
    server: initialServer || "p1",
    matchWinner: null,
    superTieBreak: false,
    tieBreak: false,       // regular tiebreak at 6-6
    tieBreakPts: 0,        // total points played in tiebreak (for server rotation)
    tieBreakServer: initialServer || "p1",  // who serves first in tiebreak
  };
  for (const p of pts) {
    // ── GHOST CORRECTION POINT ──
    // Synthetic point inserted by handleOverwriteApply. Snaps the running score to a corrected state.
    // Not a real point — does not contribute to stats — only adjusts the running score state.
    if (p._isCorrection && p._snapshot) {
      const snap = p._snapshot;
      sc.sets = snap.sets.map(s => ({ p1: s.p1 || 0, p2: s.p2 || 0 }));
      sc.games = { p1: snap.games.p1 || 0, p2: snap.games.p2 || 0 };
      sc.points = { p1: snap.points.p1, p2: snap.points.p2 };
      sc.currentSet = snap.currentSet != null ? snap.currentSet : (sc.sets.length - 1);
      sc.server = snap.server || sc.server;
      sc.tieBreak = !!snap.tieBreak;
      sc.superTieBreak = !!snap.superTieBreak;
      sc.tieBreakPts = snap.tieBreakPts || 0;
      sc.tieBreakServer = snap.tieBreakServer || sc.tieBreakServer;
      continue; // do not process as a regular point
    }
    const winner = p.pointWinner;
    if (!winner || sc.matchWinner) continue;
    const loser = winner === "p1" ? "p2" : "p1";

    // ── SUPER TIE-BREAK (deciding set, first to 10) ──
    if (sc.superTieBreak) {
      sc.points[winner] = String(Number(sc.points[winner]) + 1);
      const wp = Number(sc.points[winner]);
      const lp = Number(sc.points[loser]);
      // Server rotation: first point by initial server, then alternate every 2
      sc.tieBreakPts++;
      const tbTotal = sc.tieBreakPts;
      if (tbTotal === 1) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      } else if (tbTotal > 1 && (tbTotal - 1) % 2 === 0) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      }
      if (wp >= 10 && wp - lp >= 2) {
        sc.sets[sc.currentSet][winner]++;
        sc.matchWinner = winner;
      }
      continue;
    }

    // ── REGULAR TIEBREAK (6-6, first to 7) ──
    if (sc.tieBreak) {
      sc.points[winner] = String(Number(sc.points[winner]) + 1);
      const wp = Number(sc.points[winner]);
      const lp = Number(sc.points[loser]);
      // Server rotation: first server serves 1 point, then alternate every 2
      sc.tieBreakPts++;
      const tbTotal = sc.tieBreakPts;
      if (tbTotal === 1) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      } else if (tbTotal > 1 && (tbTotal - 1) % 2 === 0) {
        sc.server = sc.server === "p1" ? "p2" : "p1";
      }
      if (wp >= 7 && wp - lp >= 2) {
        // Tiebreak won — set goes 7-6
        sc.games[winner]++;
        sc.sets[sc.currentSet][winner] = sc.games[winner];
        sc.sets[sc.currentSet][loser] = sc.games[loser];
        sc.tieBreak = false;
        sc.tieBreakPts = 0;
        sc.games = { p1: 0, p2: 0 };
        sc.points = { p1: "0", p2: "0" };
        // Server after tiebreak: the player who received first in the tiebreak
        sc.server = sc.tieBreakServer === "p1" ? "p2" : "p1";
        const sW = setsNeeded(fmt);
        const setsWonByWinner = sc.sets.filter(st => st[winner] > st[loser]).length;
        if (setsWonByWinner >= sW) { sc.matchWinner = winner; continue; }
        const p1s = sc.sets.filter(st => st.p1 > st.p2).length;
        const p2s = sc.sets.filter(st => st.p2 > st.p1).length;
        sc.currentSet++;
        sc.sets.push({ p1: 0, p2: 0 });
        if (superTieAt11 && p1s === 1 && p2s === 1) {
          sc.superTieBreak = true;
          sc.tieBreakPts = 0;
          sc.points = { p1: "0", p2: "0" };
        }
      }
      continue;
    }

    // ── REGULAR GAME SCORING ──
    const wp = sc.points[winner]; const lp = sc.points[loser];
    let gameWon = false;
    if (wp === "AD") { gameWon = true; }
    else if (wp === "40" && lp !== "40" && lp !== "AD") { gameWon = true; }
    else if (wp === "40" && lp === "40") { sc.points[winner] = "AD"; }
    else if (wp === "40" && lp === "AD") { sc.points[loser] = "40"; }
    else {
      const seq = ["0","15","30","40"];
      const idx = seq.indexOf(wp);
      if (idx < 3) sc.points[winner] = seq[idx + 1];
    }
    if (!gameWon) continue;

    sc.points = { p1: "0", p2: "0" };
    sc.games[winner]++;
    sc.server = sc.server === "p1" ? "p2" : "p1";

    const gW = sc.games[winner], gL = sc.games[loser];
    const target = getSetTarget(fmt);

    // Check if we've reached tiebreak territory (both at target games, e.g. 6-6)
    if (gW === target && gL === target) {
      // Enter tiebreak
      sc.tieBreak = true;
      sc.tieBreakPts = 0;
      sc.tieBreakServer = sc.server; // who serves first in tiebreak
      sc.points = { p1: "0", p2: "0" };
      continue;
    }

    let setWon = (gW >= target && gW - gL >= 2);
    if (!setWon) continue;

    sc.sets[sc.currentSet][winner] = gW;
    sc.sets[sc.currentSet][loser] = gL;
    sc.games = { p1: 0, p2: 0 };
    const sW = setsNeeded(fmt);
    const setsWonByWinner = sc.sets.filter(st => st[winner] > st[loser]).length;
    if (setsWonByWinner >= sW) { sc.matchWinner = winner; break; }

    const p1s = sc.sets.filter(st => st.p1 > st.p2).length;
    const p2s = sc.sets.filter(st => st.p2 > st.p1).length;
    sc.currentSet++;
    sc.sets.push({ p1: 0, p2: 0 });
    if (superTieAt11 && p1s === 1 && p2s === 1) {
      sc.superTieBreak = true;
      sc.tieBreakPts = 0;
      sc.points = { p1: "0", p2: "0" };
    }
  }
  return sc;
}

// ─── STATS CALCULATIONS ───────────────────────────────────────────────────────
function calcStats(rawPoints) {
  // Filter out ghost correction points — they're for score state only, not real points
  const points = (rawPoints || []).filter(p => !p._isCorrection);
  if (!points.length) return null;
  const total = points.length;
  const p1pts = points.filter(p => p.pointWinner === "p1").length;
  const p2pts = total - p1pts;

  const serveStats = (pid) => {
    const served = points.filter(p => p.server === pid);
    const aces = served.filter(p => p.outcome === "Ace").length;
    const dfs = served.filter(p => p.outcome === "Double Fault").length;
    const first = served.filter(p => p.serveType === "1st Serve");
    const second = served.filter(p => p.serveType === "2nd Serve");
    const firstWon = first.filter(p => p.pointWinner === pid).length;
    const secondWon = second.filter(p => p.pointWinner === pid).length;
    const faults = served.filter(p => p.serveFault && p.serveFault !== "?");
    const faultTypes = {};
    faults.forEach(p => { faultTypes[p.serveFault] = (faultTypes[p.serveFault] || 0) + 1; });
    const zoneCount = (side) => {
      const z = {};
      served.filter(p => p.serveSide === side && p.serveZone).forEach(p => {
        z[p.serveZone] = (z[p.serveZone] || 0) + 1;
      });
      return z;
    };
    return {
      total: served.length, aces, dfs,
      firstIn: first.length, firstWon,
      secondIn: second.length, secondWon,
      faultTypes,
      deuceZones: zoneCount("Deuce"),
      adZones: zoneCount("Ad"),
    };
  };

  const rallyDist = {};
  RALLY_RANGES.forEach(r => { rallyDist[r] = points.filter(p => p.rallyLength === r).length; });

  const netP1 = points.filter(p => p.netApproach && p.server === "p1");
  const netP2 = points.filter(p => p.netApproach && p.server === "p2");

  const bpFor = (pid) => points.filter(p => p.pressurePoint && p.server !== pid);
  const bpWon = (pid) => bpFor(pid).filter(p => p.pointWinner === pid);
  const bpFaced = (pid) => points.filter(p => p.pressurePoint && p.server === pid);
  const bpSaved = (pid) => bpFaced(pid).filter(p => p.pointWinner === pid);

  const retZoneCount = (pid) => {
    const z = {};
    points.filter(p => p.server !== pid && p.returnLandZone).forEach(p => {
      z[p.returnLandZone] = (z[p.returnLandZone] || 0) + 1;
    });
    return z;
  };

  // Serve & Volley stats: server went to net (Serve +1 was a volley)
  const serveVolley = (pid) => {
    const sv = points.filter(p => p.server === pid &&
      (p.servePlusOne === "Volley" || p.servePlusOne === "Volley Forehand" || p.servePlusOne === "Volley Backhand"));
    return {
      total: sv.length,
      won: sv.filter(p => p.pointWinner === pid).length,
    };
  };

  return {
    total, p1pts, p2pts,
    p1serve: serveStats("p1"), p2serve: serveStats("p2"),
    rallyDist,
    netP1, netP2,
    p1winners: points.filter(p => p.pointWinner === "p1" && (p.outcome === "Winner" || p.outcome === "Ace")).length,
    p2winners: points.filter(p => p.pointWinner === "p2" && (p.outcome === "Winner" || p.outcome === "Ace")).length,
    p1ue: points.filter(p => p.outcome === "Unforced Error" && p.pointWinner !== "p1").length,
    p2ue: points.filter(p => p.outcome === "Unforced Error" && p.pointWinner !== "p2").length,
    p1fe: points.filter(p => p.outcome === "Forced Error" && p.pointWinner !== "p1").length,
    p2fe: points.filter(p => p.outcome === "Forced Error" && p.pointWinner !== "p2").length,
    p1bp: { opp: bpFor("p1").length, won: bpWon("p1").length, faced: bpFaced("p1").length, saved: bpSaved("p1").length },
    p2bp: { opp: bpFor("p2").length, won: bpWon("p2").length, faced: bpFaced("p2").length, saved: bpSaved("p2").length },
    p1returnZones: retZoneCount("p1"),
    p2returnZones: retZoneCount("p2"),
    p1sv: serveVolley("p1"),
    p2sv: serveVolley("p2"),
  };
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(rawPoints, setup) {
  // Filter out ghost correction points — they're score-state-only, not real points
  const points = (rawPoints || []).filter(p => !p._isCorrection);
  // CSV — verified field order (one row per point, all fields)
  const hdrs = [
    "MatchID", "PointID",
    "Pt#", "Timestamp", "ElapsedMin", "SetNumber", "GameScore", "PointScore",
    "Server", "ServerUTR", "ServerHand",
    "ServeSide", "ServeType", "ServeSpin", "ServeZone",
    "FirstServeFaultType", "FirstServeFaultZone",
    "ServeFault", "DfFaultType",
    "ReturnHand", "ReturnPosition", "ReturnLandZone", "ReturnLandAbsolute",
    "Serve+1Shot", "Serve+1Dir", "Return+1Shot", "Return+1Dir",
    "RallyLength", "Outcome", "ErrorShot", "ErrorDirection", "WinningShot",
    "NetApproach", "PressurePoint", "PressurePointType",
    "PointEndedBy",
    "PointWinner", "WinnerUTR", "WinnerHand"
  ];
  // Trim whitespace from player names for data consistency
  const p1Name = (setup.player1 || "").trim();
  const p2Name = (setup.player2 || "").trim();
  // Build a stable MatchID: date + player initials (e.g. "2026-04-11_YE_TS")
  const today = (setup.date || new Date().toISOString().slice(0,10)).slice(0,10);
  const initials = (name) => (name || "").split(/\s+/).filter(Boolean).map(w => w[0] || "").join("").toUpperCase().slice(0,2) || "XX";
  const matchID = today + "_" + initials(p1Name) + "_" + initials(p2Name);
  const matchStartTs = points.length > 0 && points[0].timestamp ? points[0].timestamp : 0;
  const rows = points.map((p, i) => {
    const isP1Server = p.server === "p1";
    const isP1Winner = p.pointWinner === "p1";
    const ss = p.scoreSnapshot || {};
    const setNum = ss.setNum || "";
    const gameStr = ss.games ? ss.games.p1 + "-" + ss.games.p2 : "";
    const ptsStr = ss.points ? ss.points.p1 + "-" + ss.points.p2 : "";
    const ts = p.timestamp ? new Date(p.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "";
    const elapsedMin = p.timestamp && matchStartTs ? Math.round((p.timestamp - matchStartTs) / 60000) : "";
    return [
      matchID,
      matchID + "_P" + (i + 1),
      i + 1,
      ts,
      elapsedMin,
      setNum,
      gameStr,
      ptsStr,
      isP1Server ? p1Name : p2Name,
      isP1Server ? (setup.p1utr || "") : (setup.p2utr || ""),
      isP1Server ? (setup.p1hand || "") : (setup.p2hand || ""),
      p.serveSide || "",
      p.serveType || "",
      p.serveSpin || "",
      p.serveZone || "",
      (p.firstServeFaultType && p.firstServeFaultType !== "?") ? p.firstServeFaultType : "",
      p.firstServeFaultZone || "",
      (p.serveFault && p.serveFault !== "?") ? p.serveFault : "",
      p.dfFaultType || "",
      p.returnHand || "",
      p.returnPosition || "",
      p.returnLandZone || "",
      p.returnLandAbsolute || "",
      p.servePlusOne || "",
      p.sp1Dir || "",
      p.returnPlusOne || "",
      p.rp1Dir || "",
      p.rallyLength || "",
      p.outcome || "",
      p.errorShot || "",
      p.errorDirection || "",
      p.shotType || "",
      p.netApproach ? "Yes" : "No",
      p.pressurePoint ? "Yes" : "No",
      p.pressurePointType || "",
      // PointEndedBy = the player who hit the final shot
      // Winner/Ace → pointWinner; Error/DF → the losing player (they hit the final shot into net/out)
      (function() {
        if (!p.outcome) return "";
        const w = isP1Winner ? p1Name : p2Name;
        const l = isP1Winner ? p2Name : p1Name;
        if (p.outcome === "Winner" || p.outcome === "Ace" || p.outcome === "Return Winner") return w;
        if (p.outcome.includes("Error") || p.outcome === "Double Fault") return l;
        return "";
      })(),
      isP1Winner ? p1Name : p2Name,
      isP1Winner ? (setup.p1utr || "") : (setup.p2utr || ""),
      isP1Winner ? (setup.p1hand || "") : (setup.p2hand || ""),
    ].map(v => { const s = String(v); return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",");
  });
  const csv = [hdrs.map(h => '"' + h + '"').join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = setup.player1 + "_vs_" + setup.player2 + "_" + setup.date + ".csv";
  a.click();
}

// ─── COURT ZONE PICKER — full court, flip button on diagram ─────────────────
function CourtZonePicker({ side, value, onChange, serverName, returnerName, flipped, onFlip, fullWidth = false }) {
  const isDeuce = (side || "Deuce") !== "Ad";
  // flipped=false: server at bottom, serve travels UP, zones at TOP half
  // flipped=true:  server at top,    serve travels DOWN, zones at BOTTOM half
  const serverY   = flipped ? 28  : 243;
  const serverLY  = flipped ? 18  : 258;
  const retLY     = flipped ? 258 : 18;
  const sName = serverName  || "Server";
  const rName = returnerName || "Returner";

  // ── HORIZONTAL FLIP LOGIC ──
  // NOT flipped (analyst behind server, server at bottom):
  //   Deuce: server RIGHT of centre (x=215), serve lands in Ad box (LEFT)
  //   Ad:    server LEFT of centre  (x=125), serve lands in Deuce box (RIGHT)
  // FLIPPED (analyst behind returner, server at top — 180° rotation):
  //   From analyst's perspective, left/right are MIRRORED:
  //   Deuce: server now appears LEFT (x=125), serve lands in RIGHT box
  //   Ad:    server now appears RIGHT (x=215), serve lands in LEFT box
  const serverX = flipped
    ? (isDeuce ? 125 : 215)   // flipped: Deuce→LEFT, Ad→RIGHT
    : (isDeuce ? 215 : 125);  // normal:  Deuce→RIGHT, Ad→LEFT

  // Box label from the serve perspective (where the ball lands)
  const boxLabel = isDeuce ? "Ad box" : "Deuce box";

  // Zone coords — always in the OPPONENT half (far side from server)
  // When NOT flipped: server bottom → zones at top (y 12-133)
  // When flipped:     server top    → zones at bottom (y 147-270)
  const zy = flipped ? 147 : 12;   // zone row y
  const zFull = flipped ? 46+46 : 66+51+2; // full height spanning deep+short

  // Zone column definitions — 3 zones: Wide, Body, T
  // Each zone spans the full service box height (no Deep/Short split)

// ─── PDF EXPORT ───────────────────────────────────────────────────────────────
function exportPDF(points, setup, score, matchTime, conditions) {
  const stats = calcStats(points);
  const { player1, player2 } = setup;
  const duration = matchTime.start && matchTime.end ? fmtDuration(matchTime.end - matchTime.start) : "In progress";
  const pct = (n, d) => d ? Math.round((n / d) * 100) + "%" : "—";

  // Zone heatmap table — 3 zones (Wide/Body/T), no depth split
  function zoneTable(zones, side) {
    const ltr = side === "Ad" ? ["T","Body","Wide"] : ["Wide","Body","T"];
    const max = Math.max(1, ...Object.values(zones).map(v => Number(v) || 0), 1);
    let headerCells = ltr.map(c => "<th>" + c + "</th>").join("");
    let cells = ltr.map(c => {
      const v = zones[c] || 0;
      const alpha = (0.08 + (v/max) * 0.8).toFixed(2);
      return "<td style='background:rgba(244,211,94," + alpha + ");font-weight:" + (v/max > 0.4 ? 700 : 400) + ";padding:10px;text-align:center;font-size:16px'>" + v + "</td>";
    }).join("");
    return "<table class='zone-table'><thead><tr><th colspan='3'>" + side + " Side</th></tr><tr>" + headerCells + "</tr></thead><tbody><tr>" + cells + "</tr></tbody></table>";
  }

  function retZoneTable(zones) {
    const max = Math.max(1, ...Object.values(zones));
    const cols = ["Cross","Center","Wide"];
    const depths = ["Deep","Mid"];
    let rows = depths.map(depth => {
      let cells = cols.map(col => {
        const key = col + "-" + depth;
        const v = zones[key] || 0;
        const alpha = (0.1 + (v/max) * 0.75).toFixed(2);
        return "<td style='background:rgba(64,145,108," + alpha + ");font-weight:" + (v/max > 0.4 ? 700 : 400) + "'>" + v + "<br><small>" + depth + "</small></td>";
      }).join("");
      return "<tr>" + cells + "</tr>";
    }).join("");
    const netRow = (zones["Net"] || 0) > 0
      ? "<tr><td colspan='3' style='background:#ffe0e0;color:#c0392b;font-weight:700;text-align:center;padding:4px'>Net: " + zones["Net"] + "</td></tr>"
      : "";
    return "<table class='zone-table'><thead><tr><th>Cross</th><th>Center</th><th>Wide</th></tr></thead><tbody>" + rows + netRow + "</tbody></table>";
  }

  function statRow(label, v1, v2) {
    return "<tr><td class='sv p1'>" + v1 + "</td><td class='sl'>" + label + "</td><td class='sv p2'>" + v2 + "</td></tr>";
  }

  function bpBox(name, bp, col) {
    return "<div class='bp-box'>" +
      "<div style='font-weight:800;color:" + col + ";margin-bottom:6px'>" + name + "</div>" +
      "<div class='bp-row'><span>BP Chances</span><span><b>" + bp.opp + "</b></span></div>" +
      "<div class='bp-row'><span>BP Won</span><span><b style='color:#27ae60'>" + bp.won + "</b> (" + pct(bp.won, bp.opp) + ")</span></div>" +
      "<div class='bp-row'><span>BP Faced</span><span><b style='color:#c0392b'>" + bp.faced + "</b></span></div>" +
      "<div class='bp-row'><span>BP Saved</span><span><b>" + bp.saved + "</b> (" + pct(bp.saved, bp.faced) + ")</span></div>" +
      "</div>";
  }

  function rallyRow(label, count, total) {
    const p = total ? Math.round((count / total) * 100) : 0;
    return "<div class='rrow'>" +
      "<span style='width:36px;font-weight:700'>" + label + "</span>" +
      "<div class='rbg'><div class='rfill' style='width:" + p + "%'></div></div>" +
      "<span style='width:26px;text-align:right;font-weight:700;color:#2d6a4f'>" + count + "</span>" +
      "<span style='width:32px;color:#999'>" + p + "%</span>" +
      "</div>";
  }

  function pointLogRow(p, i, player1, player2) {
    const srv = p.server === "p1" ? player1 : player2;
    const win = p.pointWinner === "p1" ? player1 : player2;
    const oc = p.outcome || "";
    const cls = (oc === "Winner" || oc === "Ace") ? "win" : (oc.includes("Error") || oc === "Double Fault") ? "err" : "";
    const fault = p.serveFault && p.serveFault !== "?" ? p.serveFault : "—";
    const ocLabel = p.errorShot ? ((oc.includes("Un") ? "UE" : "FE") + "-" + p.errorShot) : oc || "—";
    const even = i % 2 === 0 ? "style='background:#f8f9fb'" : "";
    return "<tr " + even + ">" +
      "<td>" + (i+1) + "</td><td>" + srv + "</td>" +
      "<td>" + (p.serveType ? p.serveType.replace(" Serve","") : "—") + "</td>" +
      "<td>" + (p.serveSide ? p.serveSide.slice(0,1) : "—") + "</td>" +
      "<td>" + (p.serveDir || "—") + "</td>" +
      "<td>" + (p.serveZone || "—") + "</td>" +
      "<td style='color:#c0392b'>" + fault + "</td>" +
      "<td>" + (p.returnHand || "—") + "</td>" +
      "<td>" + (p.returnLandZone || "—") + "</td>" +
      "<td>" + (p.servePlusOne || "—") + "</td>" +
      "<td>" + (p.returnPlusOne || "—") + "</td>" +
      "<td>" + (p.rallyLength || "—") + "</td>" +
      "<td class='" + cls + "'>" + ocLabel + "</td>" +
      "<td><b>" + win + "</b></td>" +
      "<td>" + (p.netApproach ? "✓" : "") + "</td>" +
      "<td style='color:#c0392b'>" + (p.pressurePoint ? "●" : "") + "</td>" +
      "</tr>";
  }

  const css = [
    "*{box-sizing:border-box;margin:0;padding:0}",
    "body{font-family:'Helvetica Neue',Arial,sans-serif;background:#fff;color:#1a1a2e;font-size:12px}",
    "@page{size:A4;margin:14mm}",
    ".page{max-width:780px;margin:0 auto;padding:20px}",
    ".hdr{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}",
    ".hdr h1{font-size:19px;font-weight:900}.hdr .meta{font-size:10px;opacity:.8;margin-top:2px}",
    ".dur{font-size:17px;font-weight:800;color:#f4d35e;margin-top:3px}",
    ".score-box{background:#f0f4f8;border-radius:8px;padding:10px 16px;margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}",
    ".sn{border-radius:4px;padding:3px 9px;font-weight:800;font-size:16px;color:#fff}",
    ".cond{background:#fffbeb;border-left:4px solid #f4d35e;padding:7px 11px;margin-bottom:14px;font-size:11px;color:#555;font-style:italic;border-radius:0 6px 6px 0}",
    "h2{font-size:13px;font-weight:800;color:#1b4332;border-bottom:2px solid #2d6a4f;padding-bottom:3px;margin:18px 0 8px;text-transform:uppercase;letter-spacing:1px}",
    "h3{font-size:11px;font-weight:700;color:#2d6a4f;margin:10px 0 5px}",
    ".st{width:100%;border-collapse:collapse;margin-bottom:12px}",
    ".st .sv{width:28%;text-align:center;font-size:14px;font-weight:700;padding:5px 3px}",
    ".st .p1{color:#1a5276}.st .p2{color:#8b0000}",
    ".st .sl{text-align:center;font-size:10px;color:#666;font-weight:600;padding:4px 6px;border-top:1px solid #eee;border-bottom:1px solid #eee;background:#f9f9f9}",
    ".pcols{display:flex;justify-content:space-between;margin-bottom:5px}",
    ".p1n{font-weight:800;color:#1a5276;font-size:12px}.p2n{font-weight:800;color:#8b0000;font-size:12px}",
    ".zg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}",
    ".zone-table{width:100%;border-collapse:collapse;font-size:11px}",
    ".zone-table th{background:#2d6a4f;color:#fff;padding:4px;text-align:center;font-size:10px}",
    ".zone-table td{padding:7px 3px;text-align:center;border:1px solid #ddd}",
    ".zone-table small{display:block;font-size:8px;color:#999}",
    ".mini{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:6px}",
    ".mini th{background:#2d6a4f;color:#fff;padding:4px;text-align:center;font-size:10px}",
    ".mini td{padding:4px 6px;text-align:center;border:1px solid #ddd}",
    ".bp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}",
    ".bp-box{border:1px solid #ddd;border-radius:7px;padding:9px 11px}",
    ".bp-row{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid #f5f5f5}",
    ".rrow{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}",
    ".rbg{flex:1;height:7px;background:#e8ecf0;border-radius:4px}",
    ".rfill{height:7px;background:#2d6a4f;border-radius:4px}",
    ".lt{width:100%;border-collapse:collapse;font-size:9px;margin-top:6px}",
    ".lt th{background:#2d6a4f;color:#fff;padding:3px 2px;font-size:8px;text-align:left}",
    ".lt td{padding:3px 2px;border-bottom:1px solid #f0f0f0}",
    ".win{color:#27ae60;font-weight:700}.err{color:#c0392b;font-weight:700}",
    "@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}",
  ].join("");

  let html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>TennisTag - " + player1 + " vs " + player2 + "</title><style>" + css + "</style></head><body><div class='page'>";

  // Header
  html += "<div class='hdr'><div>";
  html += "<div class='meta'>TennisTag Pro · " + setup.surface + " · " + setup.format + (setup.tournament ? " · " + setup.tournament : "") + "</div>";
  html += "<h1>" + player1 + " vs " + player2 + "</h1>";
  const p1info = [setup.p1utr ? "UTR " + setup.p1utr : "", setup.p1hand ? setup.p1hand + "-handed" : ""].filter(Boolean).join(" · ");
  const p2info = [setup.p2utr ? "UTR " + setup.p2utr : "", setup.p2hand ? setup.p2hand + "-handed" : ""].filter(Boolean).join(" · ");
  if (p1info || p2info) html += "<div style='font-size:10px;opacity:.7;margin-top:3px'>" + player1 + (p1info ? " (" + p1info + ")" : "") + "  vs  " + player2 + (p2info ? " (" + p2info + ")" : "") + "</div>";
  html += "<div class='meta'>" + setup.date + "</div>";
  html += "</div><div style='text-align:right'>";
  if (matchTime.start) html += "<div style='font-size:10px;opacity:.8'>Start: " + fmtTime(matchTime.start) + "</div>";
  if (matchTime.end)   html += "<div style='font-size:10px;opacity:.8'>End: " + fmtTime(matchTime.end) + "</div>";
  html += "<div class='dur'>&#9201; " + duration + "</div>";
  html += "</div></div>";

  // Score
  html += "<div class='score-box'>";
  html += "<span style='font-weight:800;color:#1a5276'>" + player1 + "</span>";
  score.sets.forEach(st => { html += "<span class='sn' style='background:#2d6a4f'>" + st.p1 + "</span>"; });
  html += "<span style='font-size:16px;font-weight:900;color:#aaa'>vs</span>";
  score.sets.forEach(st => { html += "<span class='sn' style='background:#8b0000'>" + st.p2 + "</span>"; });
  html += "<span style='font-weight:800;color:#8b0000'>" + player2 + "</span>";
  if (score.matchWinner) {
    const wName = score.matchWinner === "p1" ? player1 : player2;
    html += "<span style='font-size:12px;font-weight:800;color:#2d6a4f;margin-left:auto'>Winner: " + wName + "</span>";
  }
  html += "</div>";

  // Conditions
  if (conditions) html += "<div class='cond'>Conditions: " + conditions + "</div>";

  if (!stats) {
    html += "<p>No points logged.</p>";
  } else {
    // ── Per-set Match Statistics breakdown ──
    // Collect unique set numbers from points
    const setsInMatch = [];
    points.forEach(p => {
      const sn = p.scoreSnapshot && p.scoreSnapshot.setNum;
      if (sn && !setsInMatch.includes(sn)) setsInMatch.push(sn);
    });
    setsInMatch.sort((a, b) => a - b);

    // Helper: render a Match Statistics table for a given filtered point set
    function statsTable(filteredPts, label) {
      const s = calcStats(filteredPts);
      if (!s) return "";
      let h = "<h2>" + label + "</h2>";
      h += "<div style='display:flex;justify-content:space-between;margin-bottom:5px'><span style='font-weight:800;color:#28a050;font-size:12px'>" + player1 + "</span><span style='font-size:10px;color:#888'>" + s.total + " pts</span><span style='font-weight:800;color:#8840c0;font-size:12px'>" + player2 + "</span></div>";
      h += "<table class='st'><tbody>";
      h += statRow("Points Won", s.p1pts, s.p2pts);
      h += statRow("Winners", s.p1winners, s.p2winners);
      h += statRow("Unforced Errors", s.p1ue, s.p2ue);
      h += statRow("Aces", s.p1serve.aces, s.p2serve.aces);
      h += statRow("Double Faults", s.p1serve.dfs, s.p2serve.dfs);
      h += statRow("1st Serve In %", pct(s.p1serve.firstIn, s.p1serve.total), pct(s.p2serve.firstIn, s.p2serve.total));
      h += statRow("1st Serve Won %", pct(s.p1serve.firstWon, s.p1serve.firstIn), pct(s.p2serve.firstWon, s.p2serve.firstIn));
      h += statRow("2nd Serve Won %", pct(s.p1serve.secondWon, s.p1serve.secondIn), pct(s.p2serve.secondWon, s.p2serve.secondIn));
      h += statRow("Net Approaches", s.netP1.length, s.netP2.length);
      h += statRow("Net Points Won", s.netP1.filter(p=>p.pointWinner==="p1").length, s.netP2.filter(p=>p.pointWinner==="p2").length);
      if (s.p1sv.total > 0 || s.p2sv.total > 0) {
        h += statRow("Serve & Volley", s.p1sv.total, s.p2sv.total);
        h += statRow("S&V Won %", pct(s.p1sv.won, s.p1sv.total), pct(s.p2sv.won, s.p2sv.total));
      }
      h += "</tbody></table>";
      return h;
    }

    // Render per-set tables if there's more than one set of data
    if (setsInMatch.length > 1) {
      setsInMatch.forEach(sn => {
        const setPts = points.filter(p => p.scoreSnapshot && p.scoreSnapshot.setNum === sn);
        html += statsTable(setPts, "Set " + sn + " Statistics");
      });
    }

    // Full match statistics (always shown)
    html += statsTable(points, setsInMatch.length > 1 ? "Full Match Statistics" : "Match Statistics");

    // Serve zones
    html += "<h2>Serve Landing Zones</h2>";
    html += "<h3>" + player1 + "</h3><div class='zg'>" + zoneTable(stats.p1serve.deuceZones,"Deuce") + zoneTable(stats.p1serve.adZones,"Ad") + "</div>";
    html += "<h3>" + player2 + "</h3><div class='zg'>" + zoneTable(stats.p2serve.deuceZones,"Deuce") + zoneTable(stats.p2serve.adZones,"Ad") + "</div>";

    // Serve faults by side
    function faultBySide(pid, sideName) {
      const filter = (p) => p.server === pid && p.serveSide === sideName &&
        ((p.serveFault && p.serveFault !== "?") || p.firstServeFaultType);
      const pts = points.filter(filter);
      const counts = { Net: 0, Long: 0, Wide: 0, "Foot Fault": 0 };
      pts.forEach(p => {
        const ft = p.firstServeFaultType || p.serveFault;
        if (ft && counts[ft] !== undefined) counts[ft]++;
      });
      return "<table class='mini'><tr><th colspan='5'>" + sideName + " Faults</th></tr><tr><th>Net</th><th>Long</th><th>Wide</th><th>Foot</th><th>Total</th></tr><tr><td>" + counts.Net + "</td><td>" + counts.Long + "</td><td>" + counts.Wide + "</td><td>" + counts["Foot Fault"] + "</td><td><b>" + pts.length + "</b></td></tr></table>";
    }
    html += "<h2>Serve Faults by Side</h2>";
    html += "<h3>" + player1 + "</h3><div class='zg'>" + faultBySide("p1","Deuce") + faultBySide("p1","Ad") + "</div>";
    html += "<h3>" + player2 + "</h3><div class='zg'>" + faultBySide("p2","Deuce") + faultBySide("p2","Ad") + "</div>";

    // Shot type breakdowns: Winners, Errors, Serve+1, Return+1
    function shotBreakdown(pid, title, field, filterOutcome) {
      const pts = points.filter(p => p.pointWinner === pid && (!filterOutcome || filterOutcome(p)) && p[field]);
      const counts = {};
      pts.forEach(p => { counts[p[field]] = (counts[p[field]] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
      if (!sorted.length) return "<p style='color:#888;font-size:10px'>No data</p>";
      return "<table class='mini'><tr><th>" + title + "</th><th>Count</th></tr>" +
        sorted.map(([k,v]) => "<tr><td>" + k + "</td><td><b>" + v + "</b></td></tr>").join("") + "</table>";
    }
    // Collect error shots regardless of point winner (errors are hit by the losing player)
    function errorShotBreakdown(pid) {
      // errors by this player (the one who hit the ball into net/out)
      const pts = points.filter(p => p.errorShot && p.outcome && p.outcome.includes("Error") &&
        p.pointWinner !== pid); // p1 error → p2 won the point
      const counts = {};
      pts.forEach(p => { counts[p.errorShot] = (counts[p.errorShot] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
      if (!sorted.length) return "<p style='color:#888;font-size:10px'>No data</p>";
      return "<table class='mini'><tr><th>Error Shot</th><th>Count</th></tr>" +
        sorted.map(([k,v]) => "<tr><td>" + k + "</td><td><b>" + v + "</b></td></tr>").join("") + "</table>";
    }
    html += "<h2>Winners by Shot Type</h2><div class='zg'>";
    html += "<div><h3>" + player1 + "</h3>" + shotBreakdown("p1","Winning Shot","shotType", p => p.outcome === "Winner") + "</div>";
    html += "<div><h3>" + player2 + "</h3>" + shotBreakdown("p2","Winning Shot","shotType", p => p.outcome === "Winner") + "</div>";
    html += "</div>";

    html += "<h2>Errors by Shot Type</h2><div class='zg'>";
    html += "<div><h3>" + player1 + "</h3>" + errorShotBreakdown("p1") + "</div>";
    html += "<div><h3>" + player2 + "</h3>" + errorShotBreakdown("p2") + "</div>";
    html += "</div>";

    // Serve+1 and Return+1 shot breakdowns (with error indicator)
    function plusOneBreakdown(pid, field) {
      // For servePlusOne: pid is the server. For returnPlusOne: pid is the returner (opposite server)
      const targetServer = field === "servePlusOne" ? pid : (pid === "p1" ? "p2" : "p1");
      const pts = points.filter(p => p.server === targetServer && p[field]);
      const counts = {};
      const errors = {};
      pts.forEach(p => {
        const shot = p[field];
        counts[shot] = (counts[shot] || 0) + 1;
        // An error on the +1 shot: the point was lost by pid AND outcome includes Error
        if (p.outcome && p.outcome.includes("Error") && p.pointWinner !== pid) {
          errors[shot] = (errors[shot] || 0) + 1;
        }
      });
      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
      if (!sorted.length) return "<p style='color:#888;font-size:10px'>No data</p>";
      return "<table class='mini'><tr><th>Shot</th><th>Total</th><th>Errors</th></tr>" +
        sorted.map(([k,v]) => "<tr><td>" + k + "</td><td><b>" + v + "</b></td><td style='color:#c0392b'>" + (errors[k] || 0) + "</td></tr>").join("") + "</table>";
    }
    html += "<h2>Serve+1 Shot Types</h2><div class='zg'>";
    html += "<div><h3>" + player1 + "</h3>" + plusOneBreakdown("p1","servePlusOne") + "</div>";
    html += "<div><h3>" + player2 + "</h3>" + plusOneBreakdown("p2","servePlusOne") + "</div>";
    html += "</div>";
    html += "<h2>Return+1 Shot Types</h2><div class='zg'>";
    html += "<div><h3>" + player1 + "</h3>" + plusOneBreakdown("p1","returnPlusOne") + "</div>";
    html += "<div><h3>" + player2 + "</h3>" + plusOneBreakdown("p2","returnPlusOne") + "</div>";
    html += "</div>";

    // Return zones
    html += "<h2>Return Landing Zones</h2>";
    html += "<div class='zg'>";
    html += "<div><h3>" + player1 + "</h3>" + retZoneTable(stats.p1returnZones) + "</div>";
    html += "<div><h3>" + player2 + "</h3>" + retZoneTable(stats.p2returnZones) + "</div>";
    html += "</div>";

    // Break points
    html += "<h2>Break Points</h2><div class='bp-grid'>";
    html += bpBox(player1, stats.p1bp, "#1a5276");
    html += bpBox(player2, stats.p2bp, "#8b0000");
    html += "</div>";

    // Rally length
    html += "<h2>Rally Length</h2>";
    RALLY_RANGES.forEach(r => { html += rallyRow(r, stats.rallyDist[r] || 0, stats.total); });

    // Point log
    html += "<h2>Full Point Log</h2>";
    html += "<table class='lt'><thead><tr><th>#</th><th>Server</th><th>Type</th><th>Side</th><th>Dir</th><th>Zone</th><th>Fault</th><th>Ret.Hand</th><th>Ret.Zone</th><th>Srv+1</th><th>Ret+1</th><th>Rally</th><th>Outcome</th><th>Winner</th><th>Net</th><th>Pres</th></tr></thead><tbody>";
    points.forEach((p, i) => { html += pointLogRow(p, i, player1, player2); });
    html += "</tbody></table>";
  }

  html += "<div style='margin-top:22px;text-align:center;font-size:9px;color:#bbb;border-top:1px solid #eee;padding-top:8px'>Generated by TennisTag Pro &middot; " + new Date().toLocaleDateString() + "</div>";
  html += "</div><script>window.onload=function(){window.print();}<\/script></body></html>";

  const w = window.open("", "_blank");
  if (w) { w.document.write(html); w.document.close(); }
}

// ─── AUDIO STORAGE (IndexedDB) ────────────────────────────────────────────────
// Stores match recordings locally for review before Whisper upload
const AudioStorage = {
  _db: null,
  _dbName: "tennistag_audio",
  _storeName: "recordings",

  init: function() {
    return new Promise((resolve, reject) => {
      if (this._db) return resolve(this._db);
      if (!window.indexedDB) return reject(new Error("IndexedDB not supported"));
      const req = indexedDB.open(this._dbName, 1);
      req.onerror = () => reject(req.error);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this._storeName)) {
          db.createObjectStore(this._storeName, { keyPath: "id" });
        }
      };
      req.onsuccess = () => { this._db = req.result; resolve(this._db); };
    });
  },

  save: async function(recording) {
    await this.init();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(this._storeName, "readwrite");
      const store = tx.objectStore(this._storeName);
      const req = store.put(recording);
      req.onsuccess = () => resolve(recording.id);
      req.onerror = () => reject(req.error);
    });
  },

  list: async function() {
    await this.init();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(this._storeName, "readonly");
      const store = tx.objectStore(this._storeName);
      const req = store.getAll();
      req.onsuccess = () => {
        // Return metadata only (no blobs) — sorted newest first
        const list = req.result.map(r => ({
          id: r.id, name: r.name, duration: r.duration,
          markers: r.markers || [], savedAt: r.savedAt, size: r.blob ? r.blob.size : 0,
        })).sort((a, b) => b.savedAt - a.savedAt);
        resolve(list);
      };
      req.onerror = () => reject(req.error);
    });
  },

  get: async function(id) {
    await this.init();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(this._storeName, "readonly");
      const req = tx.objectStore(this._storeName).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  delete: async function(id) {
    await this.init();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(this._storeName, "readwrite");
      const req = tx.objectStore(this._storeName).delete(id);
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject(req.error);
    });
  },
};

// ─── AUDIO RECORDER ENGINE ────────────────────────────────────────────────────
const AudioRecorder = {
  _mediaRecorder: null,
  _chunks: [],
  _stream: null,
  _startTime: 0,
  _pausedDuration: 0,
  _pausedAt: 0,
  _markers: [],
  _analyser: null,
  _audioCtx: null,

  isSupported: function() {
    return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
  },

  start: async function(onStatus) {
    if (!this.isSupported()) { onStatus && onStatus("unsupported"); return false; }
    try {
      this._stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 44100 }
      });
      // Set up analyser for waveform
      this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = this._audioCtx.createMediaStreamSource(this._stream);
      this._analyser = this._audioCtx.createAnalyser();
      this._analyser.fftSize = 256;
      source.connect(this._analyser);
      // Pick best supported format
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus"
        : MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "audio/webm";
      this._mediaRecorder = new MediaRecorder(this._stream, { mimeType: mimeType, audioBitsPerSecond: 64000 });
      this._chunks = [];
      this._markers = [];
      this._pausedDuration = 0;
      this._pausedAt = 0;
      this._mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) this._chunks.push(e.data); };
      this._mediaRecorder.start(1000); // collect 1-sec chunks
      this._startTime = Date.now();
      onStatus && onStatus("recording");
      return true;
    } catch(e) {
      console.error("Audio start failed:", e);
      onStatus && onStatus(e.name === "NotAllowedError" ? "denied" : "error");
      return false;
    }
  },

  pause: function() {
    if (this._mediaRecorder && this._mediaRecorder.state === "recording") {
      this._mediaRecorder.pause();
      this._pausedAt = Date.now();
    }
  },

  resume: function() {
    if (this._mediaRecorder && this._mediaRecorder.state === "paused") {
      this._mediaRecorder.resume();
      if (this._pausedAt) { this._pausedDuration += Date.now() - this._pausedAt; this._pausedAt = 0; }
    }
  },

  addMarker: function(label) {
    const elapsed = this.getElapsed();
    const marker = { t: elapsed, label: label || "Point " + (this._markers.length + 1), ts: Date.now() };
    this._markers.push(marker);
    return marker;
  },

  getMarkers: function() { return [...this._markers]; },

  getElapsed: function() {
    if (!this._startTime) return 0;
    const now = this._pausedAt || Date.now();
    return (now - this._startTime - this._pausedDuration) / 1000;
  },

  getLevel: function() {
    if (!this._analyser) return 0;
    const data = new Uint8Array(this._analyser.frequencyBinCount);
    this._analyser.getByteFrequencyData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i];
    return sum / data.length / 255;
  },

  stop: function() {
    return new Promise((resolve) => {
      if (!this._mediaRecorder) return resolve(null);
      const duration = this.getElapsed();
      const markers = [...this._markers];
      this._mediaRecorder.onstop = async () => {
        const blob = new Blob(this._chunks, { type: this._mediaRecorder.mimeType });
        // Stop stream
        this._stream.getTracks().forEach(t => t.stop());
        if (this._audioCtx) { try { this._audioCtx.close(); } catch(e) {} }
        this._stream = null; this._mediaRecorder = null; this._chunks = []; this._analyser = null;
        resolve({ blob: blob, duration: duration, markers: markers, mimeType: blob.type });
      };
      this._mediaRecorder.stop();
    });
  },

  isRecording: function() { return !!this._mediaRecorder && this._mediaRecorder.state !== "inactive"; },
  isPaused: function() { return !!this._mediaRecorder && this._mediaRecorder.state === "paused"; },
};

// ─── MATCH AUDIO RECORDER UI ──────────────────────────────────────────────────
function MatchAudioRecorder({ onClose, T = THEMES.original }) {
  const [status, setStatus] = useState("idle"); // idle|recording|paused|saving|done
  const [elapsed, setElapsed] = useState(0);
  const [level, setLevel] = useState(0);
  const [markers, setMarkers] = useState([]);
  const [error, setError] = useState(null);
  const [matchName, setMatchName] = useState("");
  const levelIntervalRef = useRef(null);
  const timerIntervalRef = useRef(null);

  useEffect(() => {
    return () => {
      if (levelIntervalRef.current) clearInterval(levelIntervalRef.current);
      if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
      if (AudioRecorder.isRecording()) AudioRecorder.stop();
    };
  }, []);

  const fmtTime = (s) => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return (h > 0 ? h + ":" : "") + String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
  };

  const handleStart = async () => {
    setError(null);
    const ok = await AudioRecorder.start((st) => {
      if (st === "denied") setError("Microphone access denied. Enable in browser settings.");
      else if (st === "unsupported") setError("Audio recording not supported in this browser.");
      else if (st === "error") setError("Could not start recording.");
    });
    if (ok) {
      setStatus("recording");
      timerIntervalRef.current = setInterval(() => setElapsed(AudioRecorder.getElapsed()), 500);
      levelIntervalRef.current = setInterval(() => setLevel(AudioRecorder.getLevel()), 100);
    }
  };

  const handlePauseResume = () => {
    if (status === "recording") { AudioRecorder.pause(); setStatus("paused"); }
    else if (status === "paused") { AudioRecorder.resume(); setStatus("recording"); }
  };

  const handleMark = () => {
    if (status !== "recording") return;
    const m = AudioRecorder.addMarker();
    setMarkers(AudioRecorder.getMarkers());
    if (navigator.vibrate) navigator.vibrate(50);
  };

  const handleStop = async () => {
    setStatus("saving");
    if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
    if (levelIntervalRef.current) clearInterval(levelIntervalRef.current);
    const result = await AudioRecorder.stop();
    if (!result) { setError("Recording failed"); setStatus("idle"); return; }
    const id = "rec_" + Date.now();
    const name = matchName || ("Match " + new Date().toLocaleString());
    try {
      await AudioStorage.save({
        id: id, name: name, blob: result.blob, duration: result.duration,
        markers: result.markers, mimeType: result.mimeType, savedAt: Date.now(),
      });
      // Also trigger download
      const url = URL.createObjectURL(result.blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name.replace(/[^a-zA-Z0-9]/g, "_") + (result.mimeType.includes("mp4") ? ".m4a" : ".webm");
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus("done");
    } catch(e) {
      setError("Save failed: " + e.message);
      setStatus("idle");
    }
  };

  const isRec = status === "recording";
  const isPaused = status === "paused";
  const active = isRec || isPaused;

  return React.createElement('div', { style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 },}

const WhisperClient = {
  API_URL: "https://api.openai.com/v1/audio/transcriptions",

  getKey: function() { try { return localStorage.getItem("tennistag_openai_key") || ""; } catch(e) { return ""; } },
  setKey: function(k) { try { localStorage.setItem("tennistag_openai_key", k); } catch(e) {} },
  hasKey: function() { return !!this.getKey(); },

  transcribe: async function(blob, prompt, onProgress) {
    const key = this.getKey();
    if (!key) throw new Error("No OpenAI API key configured. Open Settings to add one.");
    if (!blob) throw new Error("No audio blob provided");

    const fd = new FormData();
    fd.append("file", blob, "match.webm");
    fd.append("model", "whisper-1");
    fd.append("response_format", "verbose_json");
    fd.append("timestamp_granularities[]", "word");
    if (prompt) fd.append("prompt", prompt);
    fd.append("language", "en");

    onProgress && onProgress({ stage: "uploading", percent: 0 });

    try {
      const res = await fetch(this.API_URL, {
        method: "POST",
        headers: { "Authorization": "Bearer " + key },
        body: fd,
      });
      onProgress && onProgress({ stage: "processing", percent: 50 });
      if (!res.ok) {
        const err = await res.text();
        throw new Error("Whisper API error " + res.status + ": " + err.slice(0, 200));
      }
      const data = await res.json();
      onProgress && onProgress({ stage: "done", percent: 100 });
      return data; // { text, words: [{word, start, end}], segments, language, duration }
    } catch(e) {
      onProgress && onProgress({ stage: "error", error: e.message });
      throw e;
    }
  },
};

const TennisVocabParser = {
  WHISPER_PROMPT: "Tennis match tagging by Younis. Players: Younis. Common terms: ace, fault, double fault, first serve, second serve, forehand, backhand, volley, slice, kick serve, flat, wide, body, middle, tee, down the tee, down the line, cross court, unforced error, forced error, winner, return forehand, return backhand, behind the baseline, on the baseline, inside the baseline, serve plus one, return plus one, approach shot, drop shot, lob, overhead, rally length 0-4, rally length 5-8, rally length 9-12, rally length 13+, deuce, advantage, love 15, 30 15, 40 15, break point, net approach, at the net, both at the net, score is, leads, first game, second game, first set, second set, game goes to.",

  // Apply phonetic aliases — replace mistranscriptions globally
  _normalize: function(text) {
    let t = " " + text.toLowerCase() + " ";
    const aliases = TENNIS_VOCAB._phonetic_aliases;
    Object.keys(aliases).forEach(canonical => {
      aliases[canonical].forEach(variant => {
        const re = new RegExp("\\b" + variant.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "gi");
        t = t.replace(re, canonical);
      });
    });
    return t.trim();
  },

  parse: function(transcript, markers, opponentName) {
    if (!transcript || !transcript.text) return { points: [], rawText: "" };
    const rawText = transcript.text;
    const words = transcript.words || [];

    // Normalize the full text
    const normalizedText = this._normalize(rawText);
    // Build per-player alias list (Younis pre-seeded + opponent if provided)
    const playerAliases = { Younis: TENNIS_VOCAB._players_pre_seeded.Younis };
    if (opponentName) playerAliases[opponentName] = [opponentName.toLowerCase()];

    // Step 1: Layered segmentation into utterances
    const segments = this._segment(words, markers || []);

    // Step 2: For each segment, extract tags
    const points = segments.map((seg, i) => {
      const segText = this._normalize(seg.words.map(w => w.word).join(" "));
      const tags = this._extractTags(segText);
      const winner = this._extractWinner(segText, playerAliases, tags);
      // Auto-fill rally length default
      if (!tags.rallyLength && tags.outcome) tags.rallyLength = "0-4";
      return {
        id: "p" + (i + 1),
        pointNum: i + 1,
        startTime: seg.start, endTime: seg.end,
        text: seg.words.map(w => w.word).join(" "),
        normalizedText: segText,
        tags: tags,
        pointWinner: winner,
        confidence: this._confidence(tags),
        approved: false,
      };
    }).filter(p => Object.keys(p.tags).filter(k => !k.startsWith("_")).length > 0);

    return { points: points, rawText: rawText, words: words };
  },

  _segment: function(words, markers) {
    if (!words.length) return [];
    // PRIMARY: marker-based segmentation (user taps MARK after every point)
    if (markers && markers.length > 0) {
      return this._segmentByMarkers(words, markers);
    }
    // FALLBACK: split on "first serve" / "second serve" only
    // (for legacy recordings without markers — score-aware but not outcome-based)
    return this._segmentByServeAnnouncements(words);
  },

  _segmentByMarkers: function(words, markers) {
    // Each marker defines the END of a point. Words between markers = one point.
    const segs = [];
    const sorted = [...markers].sort((a,b) => a.t - b.t);
    let prev = 0;
    sorted.forEach(m => {
      const sw = words.filter(w => w.start >= prev && w.start <= m.t);
      if (sw.length) segs.push({ start: sw[0].start, end: sw[sw.length-1].end, words: sw });
      prev = m.t;
    });
    // Any words after the last marker = final point
    const fw = words.filter(w => w.start > prev);
    if (fw.length) segs.push({ start: fw[0].start, end: fw[fw.length-1].end, words: fw });
    return segs;
  },

  _segmentByServeAnnouncements: function(words) {
    // Fallback for unmarked recordings: split at each "first serve" or "second serve"
    // announcement that comes AFTER a gap (so consecutive "first serve fault second serve"
    // stays as one point). Score callouts also split.
    const segs = []; let cur = [];
    const scoreKws = ["love","all","deuce"];
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const wText = w.word.toLowerCase().replace(/[.,!?]/g,"");
      const nextText = words[i+1] ? words[i+1].word.toLowerCase().replace(/[.,!?]/g,"") : "";
      const combo = wText + " " + nextText;
      // Detect "first serve" at the start of a new point (after score callout OR gap)
      const isNewServe = (combo === "first serve" || combo === "second serve");
      const gap = words[i+1] ? (words[i+1].start - w.end) : 0;
      const afterScore = scoreKws.some(k => wText.includes(k));
      // Split BEFORE a new serve announcement, after a score/game marker, or after a 3s+ gap
      if ((isNewServe && cur.length > 0 && (gap > 0.5 || afterScore)) || afterScore || gap > 3) {
        if (cur.length) {
          segs.push({ start: cur[0].start, end: cur[cur.length-1].end, words: [...cur] });
          cur = [];
        }
      }
      cur.push(w);
    }
    if (cur.length) segs.push({ start: cur[0].start, end: cur[cur.length-1].end, words: cur });
    return segs;
  },

  _extractTags: function(text) {
    const tags = {};
    Object.keys(TENNIS_VOCAB).forEach(catKey => {
      if (catKey.startsWith("_")) return;
      const cat = TENNIS_VOCAB[catKey];
      let bestMatch = null; let bestLen = 0;
      Object.keys(cat).forEach(termKey => {
        const term = cat[termKey];
        if (!term.synonyms) return;
        term.synonyms.forEach(syn => {
          if (text.includes(syn) && syn.length > bestLen) {
            bestMatch = term; bestLen = syn.length;
          }
        });
      });
      if (bestMatch && bestMatch.tags) {
        Object.assign(tags, bestMatch.tags);
        if (bestMatch.auto) tags._autoWinner = bestMatch.auto;
      }
    });
    return tags;
  },

  _extractWinner: function(text, playerAliases, tags) {
    // Look for "from X", "by X", "X leads" patterns
    const lower = text.toLowerCase();
    let foundPlayer = null;
    Object.keys(playerAliases).forEach(canonical => {
      playerAliases[canonical].forEach(alias => {
        const patterns = [`from ${alias}`, `by ${alias}`, `${alias} leads`, `point goes to ${alias}`, `game goes to ${alias}`];
        if (patterns.some(p => lower.includes(p))) foundPlayer = canonical;
      });
    });
    return foundPlayer;
  },

  _confidence: function(tags) {
    const count = Object.keys(tags).filter(k => !k.startsWith("_")).length;
    if (count >= 4) return "high";
    if (count >= 2) return "medium";
    return "low";
  },
};

// ─── AUDIO → TENNISTAG FIELD MAPPER ─────────────────────────────────────────
// Converts parsed audio points into TennisTag point objects compatible with
// the main tagging/stats/export pipeline
function mapParsedToTagPoints(parsedPoints, p1Name, p2Name) {
  const p1Lower = (p1Name || "").toLowerCase();
  const p2Lower = (p2Name || "").toLowerCase();

  return parsedPoints.map((p, idx) => {
    const t = p.tags || {};
    // Determine server — alternate games based on point index (fallback)
    // TODO: smarter server tracking from parsed data
    const server = idx % 2 === 0 ? "p1" : "p2";
    // Resolve point winner from parsed player name
    let pointWinner = null;
    if (p.pointWinner) {
      const pw = p.pointWinner.toLowerCase();
      if (pw.includes(p1Lower) || p1Lower.includes(pw)) pointWinner = "p1";
      else if (pw.includes(p2Lower) || p2Lower.includes(pw)) pointWinner = "p2";
    }
    // Auto-fill winner from outcome for Ace/DF/RetErr/RetWin
    if (!pointWinner) {
      if (t.outcome === "Ace" || t.outcome === "Return Error") pointWinner = server;
      else if (t.outcome === "Double Fault" || t.outcome === "Return Winner") pointWinner = server === "p1" ? "p2" : "p1";
    }
    // Map shotType into winningShot or errorShot based on outcome
    let winningShot = null, errorShot = null;
    if (t.shotType) {
      if (t.outcome === "Winner") winningShot = t.shotType;
      else if (t.outcome && t.outcome.includes("Error")) errorShot = t.shotType;
    }
    // Map direction to serve+1 or return+1 direction based on context
    let sp1Dir = null, rp1Dir = null, servePlusOne = null, returnPlusOne = null;
    if (t.shotContext === "serve+1") {
      servePlusOne = t.shotType || null;
      sp1Dir = t.direction || null;
    } else if (t.shotContext === "return+1") {
      returnPlusOne = t.shotType || null;
      rp1Dir = t.direction || null;
    }
    return {
      id: "audio_" + idx + "_" + Date.now(),
      server: server,
      serveType: t.serveType || null,
      serveSpin: t.serveSpin || null,
      serveZone: t.serveZone || null,
      serveFault: t.serveFault || null,
      serveSide: null, // will be auto-derived by rebuildScore
      returnHand: t.returnHand || null,
      returnPosition: t.returnPosition || null,
      returnLandZone: null,
      servePlusOne: servePlusOne,
      sp1Dir: sp1Dir,
      returnPlusOne: returnPlusOne,
      rp1Dir: rp1Dir,
      rallyLength: t.rallyLength || "0-4",
      outcome: t.outcome || null,
      errorShot: errorShot,
      errorDirection: t.errorDirection || null,
      shotType: winningShot || errorShot, // legacy field
      winningShot: winningShot,
      netApproach: t.netApproach && t.netApproach !== "?" ? t.netApproach : null,
      pressurePoint: false,
      pointWinner: pointWinner,
      // Audio-specific metadata
      _source: "audio",
      _audioStartTime: p.startTime,
      _audioEndTime: p.endTime,
      _confidence: p.confidence,
      _originalText: p.text,
    };
  });
}
