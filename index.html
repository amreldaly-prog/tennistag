// ─── VOICE TAGGING ENGINE ─────────────────────────────────────────────────────
// Uses Web Speech API (webkitSpeechRecognition) for hands-free courtside tagging.
// Supported on iPad Safari (requires internet for speech processing).
const VoiceEngine = {
  _recognition: null,
  _active: false,
  _onCommand: null,
  _onStatus: null,

  isSupported: function() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },

  start: function(onCommand, onStatus) {
    if (!this.isSupported()) {
      if (onStatus) onStatus("unsupported");
      return false;
    }
    if (this._active) return true;

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    this._recognition = new SR();
    this._recognition.continuous = true;
    this._recognition.interimResults = false;
    this._recognition.lang = "en-US";
    this._recognition.maxAlternatives = 3;
    this._onCommand = onCommand;
    this._onStatus = onStatus;

    this._recognition.onresult = (event) => {
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          const raw = event.results[i][0].transcript.trim().toLowerCase();
          const confidence = event.results[i][0].confidence;
          console.log("🎤 Heard:", raw, "(" + Math.round(confidence * 100) + "%)");
          const cmd = this._parseCommand(raw);
          if (cmd && this._onCommand) {
            this._onCommand(cmd, raw, confidence);
          }
        }
      }
    };

    this._recognition.onerror = (event) => {
      console.warn("🎤 Error:", event.error);
      if (event.error === "not-allowed") {
        if (this._onStatus) this._onStatus("denied");
        this._active = false;
      } else if (event.error === "network") {
        if (this._onStatus) this._onStatus("offline");
      }
    };

    this._recognition.onend = () => {
      // Auto-restart if still active (speech recognition stops after silence)
      // Throttle: don't restart more than once per second to prevent freeze loops
      if (this._active) {
        const now = Date.now();
        if (this._lastRestart && now - this._lastRestart < 1000) {
          // Too fast — wait before retrying
          setTimeout(() => {
            if (this._active) {
              this._lastRestart = Date.now();
              try { this._recognition.start(); } catch(e) {}
            }
          }, 1500);
        } else {
          this._lastRestart = now;
          try { this._recognition.start(); } catch(e) {}
        }
      }
    };

    try {
      this._recognition.start();
      this._active = true;
      if (onStatus) onStatus("listening");
      return true;
    } catch(e) {
      console.error("🎤 Start failed:", e);
      if (onStatus) onStatus("error");
      return false;
    }
  },

  stop: function() {
    this._active = false;
    if (this._recognition) {
      try { this._recognition.stop(); } catch(e) {}
    }
    if (this._onStatus) this._onStatus("stopped");
  },

  // ── Parse spoken words into structured commands ──
  _parseCommand: function(raw) {
    // Normalize common speech-to-text variations
    const text = raw
      .replace(/1st/g, "first").replace(/2nd/g, "second")
      .replace(/double fault/g, "doublefault")
      .replace(/unforced error/g, "unforcederror")
      .replace(/forced error/g, "forcederror")
      .replace(/return error/g, "returnerror")
      .replace(/return winner/g, "returnwinner")
      .replace(/drop shot/g, "dropshot")
      .replace(/down the line/g, "downtheline")
      .replace(/cross court/g, "crosscourt")
      .replace(/cross-court/g, "crosscourt");

    const words = text.split(/\s+/);
    const has = (w) => words.some(x => x.includes(w));

    // ── Quick outcomes (highest priority) ──
    if (has("ace") || has("aces")) return { action: "quickTag", outcome: "Ace" };
    if (has("doublefault") || (has("double") && has("fault"))) return { action: "quickTag", outcome: "Double Fault" };
    if (has("returnerror") || (has("return") && has("error"))) return { action: "quickTag", outcome: "Return Error" };
    if (has("returnwinner") || (has("return") && has("winner"))) return { action: "quickTag", outcome: "Return Winner" };
    if (has("let") && !has("left")) return { action: "let" };

    // ── Compound quick commands: "ace wide" / "ace tee" ──
    // (handled by quickTag + zone in same utterance — quickTag takes priority, zone set separately)

    // ── Fault ──
    if (has("fault") && !has("double") && !has("foot")) {
      // Check for fault type in same phrase: "fault net" / "fault long" / "fault wide"
      if (has("net")) return { action: "faultWithType", type: "Net" };
      if (has("long")) return { action: "faultWithType", type: "Long" };
      return { action: "fault" };
    }
    if (has("foot") && has("fault")) return { action: "faultType", type: "Foot Fault" };
    if (has("net") && has("fault")) return { action: "faultType", type: "Net" };

    // ── Serve type ──
    if (has("first") && has("serve")) return { action: "setServe", type: "1st Serve" };
    if (has("second") && has("serve")) return { action: "setServe", type: "2nd Serve" };

    // ── Outcomes ──
    if (has("winner")) return { action: "setOutcome", outcome: "Winner" };
    if (has("unforcederror") || has("unforced")) return { action: "setOutcome", outcome: "Unforced Error" };
    if (has("forcederror") || (has("forced") && has("error"))) return { action: "setOutcome", outcome: "Forced Error" };
    if (has("error") && !has("return") && !has("forced") && !has("unforced")) return { action: "setOutcome", outcome: "Unforced Error" };

    // ── Serve spin ──
    if (has("flat") && !has("flat out")) return { action: "setSpin", spin: "Flat" };
    if (has("slice") && !has("slice forehand") && !has("slice backhand")) return { action: "setSpin", spin: "Slice" };
    if (has("kick")) return { action: "setSpin", spin: "Kick" };
    if (has("underarm") || has("under arm") || has("underhand")) return { action: "setSpin", spin: "Underarm" };

    // ── Serve zone (3 zones: Wide, Body, T) ──
    if (has("wide")) return { action: "setZone", zone: "Wide" };
    if (has("body") && !has("nobody")) return { action: "setZone", zone: "Body" };
    if (has("tee") || text === "t" || (has("center") && has("serve")) || has("middle")) return { action: "setZone", zone: "T" };

    // ── Shot types (context-aware: error vs winner) ──
    if (has("forehand") && has("volley")) return { action: "setShot", shot: "Volley Forehand" };
    if (has("backhand") && has("volley")) return { action: "setShot", shot: "Volley Backhand" };
    if (has("slice") && has("forehand")) return { action: "setShot", shot: "Slice Forehand" };
    if (has("slice") && has("backhand")) return { action: "setShot", shot: "Slice Backhand" };
    if (has("approach") && has("forehand")) return { action: "setShot", shot: "Approach Forehand" };
    if (has("approach") && has("backhand")) return { action: "setShot", shot: "Approach Backhand" };
    if (has("forehand")) return { action: "setShot", shot: "Forehand" };
    if (has("backhand")) return { action: "setShot", shot: "Backhand" };
    if (has("volley")) return { action: "setShot", shot: "Volley" };
    if (has("overhead") || has("smash")) return { action: "setShot", shot: "Overhead" };
    if (has("dropshot") || (has("drop") && has("shot"))) return { action: "setShot", shot: "Drop Shot" };
    if (has("lob")) return { action: "setShot", shot: "Lob" };
    if (has("tweener") || has("between") && has("legs")) return { action: "setShot", shot: "Tweener" };
    if (has("half") && has("volley")) return { action: "setShot", shot: "Half Volley" };

    // ── Return hand ──
    if (has("return") && has("forehand")) return { action: "setReturnHand", hand: "Forehand" };
    if (has("return") && has("backhand")) return { action: "setReturnHand", hand: "Backhand" };

    // ── Error direction ──
    if (has("into") && has("net")) return { action: "setErrorDir", dir: "Net" };
    if (has("in") && has("net") && !has("winner")) return { action: "setErrorDir", dir: "Net" };
    if (has("long") && !has("rally")) return { action: "setErrorDir", dir: "Long" };
    if (has("out") && !has("long") && !has("rally")) return { action: "setErrorDir", dir: "Wide" };

    // ── Rally length ──
    if (has("short") && has("rally")) return { action: "setRally", rally: "0-4" };
    if (has("medium") && has("rally")) return { action: "setRally", rally: "5-8" };
    if (has("long") && has("rally")) return { action: "setRally", rally: "9-12" };
    if (has("very") && has("long")) return { action: "setRally", rally: "13+" };

    // ── Net approach ──
    if (has("net") && has("approach")) return { action: "netApproach", who: "server" };
    if (has("approach") && has("net")) return { action: "netApproach", who: "server" };
    if (has("came") && has("net")) return { action: "netApproach", who: "server" };
    if (has("serve") && has("volley")) return { action: "netApproach", who: "server" };

    // ── Direction (serve+1 / return+1) ──
    if (has("crosscourt") || has("cross")) return { action: "setDirection", dir: "Cross-Court" };
    if (has("downtheline") || (has("down") && has("line"))) return { action: "setDirection", dir: "Down-the-Line" };

    // ── Point winner ──
    if (has("server") && (has("wins") || has("won") || has("point"))) return { action: "setWinner", winner: "server" };
    if (has("returner") && (has("wins") || has("won") || has("point"))) return { action: "setWinner", winner: "returner" };
    if (has("player") && has("one")) return { action: "setWinner", winner: "server" };
    if (has("player") && has("two")) return { action: "setWinner", winner: "returner" };

    // ── Controls ──
    if (has("undo") || has("take") && has("back")) return { action: "undo" };
    if (has("redo")) return { action: "redo" };
    if (has("log") || has("lock") || has("confirm") || has("done") || has("next")) return { action: "log" };
    if (has("flip") || has("rotate") || has("switch") && has("end")) return { action: "flip" };
    if (has("edit") || has("correct")) return { action: "editLast" };
    if (has("pause")) return { action: "pause" };
    if (has("resume")) return { action: "resume" };
    if (has("full") && has("width") || has("expand")) return { action: "fullWidth" };
    if (has("split") || has("show") && has("log")) return { action: "splitView" };

    return null; // unrecognized
  },
};

  const [voiceLastCmd, setVoiceLastCmd] = useState(null);
  const handleFlipCourt = () => {

  };

  const [cloudUser, setCloudUser] = useState(null);
  const [showAuthModal, setShowAuthModal] = useState(false);
  const [cloudReady, setCloudReady] = useState(false);

  useEffect(() => {
    if (!CLOUD_ENABLED) return;

      setCloudReady(ok);

        });
      }

  const tagPanelRef = useRef(null);

  const SAVE_KEY = "tennistag_session";

  const saveSession = useCallback((pts, sc, su, mt, cond, tid, extras) => {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        points: pts, score: sc, setup: su,
        matchTime: mt, conditions: cond, themeId: tid,
        superTieAt11: extras.superTieAt11 || false,
        courtFlipped: extras.courtFlipped || false,
        currentTag: extras.currentTag || null,
        savedAt: Date.now(),
      }));
    } catch(e) { /* storage full or unavailable */ }
  }, []);

  const [savedSession, setSavedSession] = useState(() => {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      // Only restore if saved within last 24 hours
      if (Date.now() - s.savedAt > 86400000) { localStorage.removeItem(SAVE_KEY); return null; }
      return s;
    } catch(e) { return null; }
  });

  const [showRestore, setShowRestore] = useState(!!savedSession);

  const restoreSession = () => {
    if (!savedSession) return;
    setSetup(savedSession.setup);
    setPoints(savedSession.points || []);
    setScore(savedSession.score);
    setMatchTime(savedSession.matchTime || { start: null, end: null });
    setConditions(savedSession.conditions || "");
    setThemeId(savedSession.themeId || "original");
    setSuperTieAt11(savedSession.superTieAt11 || false);
    setCourtFlipped(savedSession.courtFlipped || false);
    if (savedSession.currentTag) setTag(savedSession.currentTag);
    setSavedSession(null);
    setShowRestore(false);
    setTab("tag");
  };

  const discardSession = () => {
    localStorage.removeItem(SAVE_KEY);
    setSavedSession(null);
    setShowRestore(false);
  };

  // Auto-save whenever key state changes (debounced)
  const saveTimerRef = useRef(null);
  useEffect(() => {
    if (!setup) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      try {
        // Check localStorage usage before saving (prevent quota exceeded freeze)
        const data = JSON.stringify({
          points: points, score: score, setup: setup,
          matchTime: matchTime, conditions: conditions, themeId: themeId,
          superTieAt11: superTieAt11, courtFlipped: courtFlipped,
          currentTag: tag, savedAt: Date.now(),
        });
        // Only save if under 4MB (localStorage limit is ~5MB)
        if (data.length < 4000000) {
          localStorage.setItem(SAVE_KEY, data);
        } else {
          console.warn("⚠️ Session too large for localStorage (" + Math.round(data.length/1024) + "KB), skipping save");
        }
      } catch(e) {
        console.warn("⚠️ Save failed:", e.message);
      }
      // Cloud auto-save (if authenticated)
      if (CLOUD_ENABLED && cloudUser) {
        try {
          const sessionKey = setup.player1.replace(/[^a-zA-Z0-9]/g,"") + "_" + setup.date;
          CloudStorage.autoSave(sessionKey, {
            setup, points, score, matchTime, conditions, themeId,
          });
        } catch(e) { console.warn("☁️ Cloud auto-save failed:", e); }
      }
    }, 3000); // debounce: save every 3 seconds max (increased from 2s for stability)
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [points, score, matchTime, conditions, themeId, setup, superTieAt11, courtFlipped, tag, cloudUser]);

  const handleImportAudioMatch = (data) => {
    const setupData = { player1: data.p1Name, player2: data.p2Name, surface: data.surface, format: data.format, date: data.date, tournament: data.tournament, conditions: data.conditions, p1utr: data.p1utr, p2utr: data.p2utr, p1hand: data.p1hand, p2hand: data.p2hand };
    const tagPoints = mapParsedToTagPoints(data.parsedPoints, data.p1Name, data.p2Name);
    setSetup(setupData);
    setConditions(setupData.conditions);
    setSuperTieAt11(data.superTie || false);
    setPoints(tagPoints);
    setScore(rebuildScore(tagPoints, setupData.format, false));
    setMatchTime({ start: Date.now(), end: null, pausedMs: 0, pausedAt: null });
    setTag(EMPTY_TAG);
    setTranscribingRec(null);
    setTab('stats');
  };

  const handleStart = (form) => {
    localStorage.removeItem("tennistag_session");
    setSetup(form);
    setConditions(form.conditions || "");
    setSuperTieAt11(false);
    setShowSuperTieModal(false);
    setInitialServer("p1"); // Reset to default — user can swap after setup
    setScore(rebuildScore([], form.format, false, "p1"));
    setPoints([]);
    setMatchTime({ start: Date.now(), end: null, pausedMs: 0, pausedAt: null });
    setTag(EMPTY_TAG);
    setTab("tag");
  };

  const handleLog = () => {
    try {
    // Compute resolved values (auto-fills for ace/df/return outcomes)
    const srv = score.server;
    const isAutoOutcome = tag.outcome === "Ace" || tag.outcome === "Double Fault" || tag.outcome === "Return Error" || tag.outcome === "Return Winner";
    const autoW = tag.outcome === "Ace" || tag.outcome === "Return Error" ? srv
      : tag.outcome === "Double Fault" || tag.outcome === "Return Winner" ? (srv === "p1" ? "p2" : "p1")
      : tag.pointWinner;
    const autoR = isAutoOutcome ? "0-4" : tag.rallyLength;
    if (!autoW) return; // still need a point winner
    // ── Auto-detect pressure point from current score ──
    const autoPressure = detectPressurePoint(score, setup.format);
    const autoPressureType = detectPressurePointType(score, setup.format);
    const newPoint = {
      ...tag,
      id: Date.now() + "-" + points.length,
      timestamp: Date.now(),
      server: srv,
      serveSide: deriveServeSide(score.points),
      pointWinner: autoW,
      rallyLength: autoR,
      pressurePoint: tag.pressurePoint || autoPressure,
      pressurePointType: autoPressureType,
      // Map relative return zone → absolute court position
      returnLandAbsolute: (function() {
        const rz = tag.returnLandZone;
        if (!rz || rz === "Net") return rz || "";
        const side = deriveServeSide(score.points);
        const isDeuce = side === "Deuce";
        // Relative: Cross/Down-line/Centre × Deep/Mid
        // Absolute: Deuce-side/Ad-side/Centre × Deep/Mid
        const parts = rz.split("-");
        const dir = parts[0]; // Cross, Down-line, Centre
        const depth = parts.slice(1).join("-"); // Deep, Mid
        if (dir === "Centre") return "Centre-" + depth;
        // Deuce side: Down-line=Ad-side, Cross=Deuce-side
        // Ad side: Down-line=Deuce-side, Cross=Ad-side
        if (isDeuce) {
          return (dir === "Down-line" ? "Ad-side" : "Deuce-side") + "-" + depth;

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error: error };
  }
  componentDidCatch(error, errorInfo) {
    console.error("TennisTag Error:", error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: {
        position: "fixed", inset: 0, background: "#0d1b2a",

        React.createElement('div', { style: { fontSize: 48, marginBottom: 16 }}, "🎾"),

          String(this.state.error)),

  }
}
